    }

    function checkRateLimit(userId, action) {
        const key = userId + '_' + action;
        const now = Date.now();
        const limit = action === 'POSTS' ? SECURITY.RATE_LIMIT_POSTS : SECURITY.RATE_LIMIT_COMMENTS;
        if (!rateLimits.has(key)) { rateLimits.set(key, { count: 1, first: now }); return true; }
        const rec = rateLimits.get(key);
        if (now - rec.first > SECURITY.RATE_LIMIT_WINDOW) { rateLimits.set(key, { count: 1, first: now }); return true; }
        rec.count++;
        return rec.count <= limit;
    }
    
    async function validateFileMagicBytes(file, expectedType) {
        return new Promise(resolve => {
            const reader = new FileReader();
            reader.onloadend = e => {
                const arr = new Uint8Array(e.target.result).subarray(0, 4);
                let header = '';
                for (let b of arr) header += b.toString(16).padStart(2, '0');
                if (expectedType === 'image') {
                    resolve(header.startsWith('ffd8ff') || header.startsWith('89504e47') || header.startsWith('47494638') || header.startsWith('52494646'));
                } else if (expectedType === 'audio') {
                    resolve(header.startsWith('494433') || header.startsWith('fffb') || header.startsWith('fff3'));
                } else resolve(false);
            };
            reader.readAsArrayBuffer(file.slice(0, 4));
        });
    }

    }

    async function login(login, pass) {
        login = sanitizeInput(login, 30);
        const attempts = loginAttempts.get(login) || { count: 0, last: 0 };
        if (attempts.count >= SECURITY.MAX_LOGIN_ATTEMPTS) {
            const timeLeft = SECURITY.LOCKOUT_TIME - (Date.now() - attempts.last);
            if (timeLeft > 0) {
                showMessage(`Слишком много попыток. Попробуйте через ${Math.ceil(timeLeft / 60000)} мин.`, 'error');
                return;
            }
            loginAttempts.delete(login);
        }
        try {
            const { data } = await supabase.from('users').select('*');
            if (data) users = data;
            const u = users.find(x => x.login === login);
            if (!u) {
                loginAttempts.set(login, { count: attempts.count + 1, last: Date.now() });
                showMessage("Неверный логин или пароль", 'error');
                return;
            }
            const valid = await verifyPassword(pass, u.password);
            if (!valid) {
                loginAttempts.set(login, { count: attempts.count + 1, last: Date.now() });
                showMessage("Неверный логин или пароль", 'error');
                return;
            }
            if (u.banned) {
                showMessage("Аккаунт заблокирован!", 'error');
                return;
            }
            loginAttempts.delete(login);
            currentUserId = u.id;
            viewingUserId = null;
            window.location.hash = '';
            
            const sessionData = {
                userId: currentUserId,
                fingerprint: SECURITY.getFingerprint(),
                timestamp: Date.now()
            };
            localStorage.setItem('rb_session', JSON.stringify(sessionData));
            
            render();
            showMessage("Добро пожаловать, " + u.name, 'success');
        } catch (error) {
            showMessage("Ошибка при входе", 'error');
        }
    }

    }

    async function register(login, pass, name, agreeToRules) {
        if (!agreeToRules) { showMessage("Вы должны согласиться с правилами", 'error'); return false; }
        login = sanitizeInput(login, 30);
        name = sanitizeInput(name, 50);
        if (!/^[a-zA-Z0-9_-]{3,30}$/.test(login)) { showMessage("Логин: 3-30 символов (буквы, цифры, _, -)", 'error'); return false; }
        if (pass.length < SECURITY.MIN_PASSWORD_LENGTH) { showMessage("Пароль: минимум " + SECURITY.MIN_PASSWORD_LENGTH + " символов", 'error'); return false; }
        if (name.length < 2) { showMessage("Имя: минимум 2 символа", 'error'); return false; }
        if (users.find(x => x.login.toLowerCase() === login.toLowerCase())) { showMessage("Логин занят", 'error'); return false; }
        try {
            const newId = "user_" + Date.now() + "_" + Math.random().toString(36).substr(2, 9);
            const h = await hashPassword(pass);
            const newUser = { id: newId, login, password: h, name, isAdmin: false, verified: false, avatar: "", banned: false, lastProfileUpdate: 0 };
            await supabase.from('users').upsert(newUser);
            users.push(newUser);
            showMessage("Регистрация успешна! Войдите.", 'success');
            return true;
        } catch (error) {
            showMessage("Ошибка при регистрации", 'error');
            return false;
        }
    }
    
    async function toggleFollow(a, b) {
        if (a === b) { showMessage("Нельзя подписаться на себя", 'error'); return; }
        if (!subscriptions[a]) subscriptions[a] = [];
        const i = subscriptions[a].indexOf(b);
        if (i === -1) subscriptions[a].push(b);
        else subscriptions[a].splice(i, 1);
        await supabase.from('subscriptions').upsert({ userId: a, following: subscriptions[a] });
        renderSidebar();
        renderMobile();
        showMessage(i === -1 ? "Вы подписались" : "Вы отписались", 'success');
    }
    
    async function toggleLike(id) {
        const u = getCurrentUser();
        if (!u) { showMessage("Войдите в аккаунт", 'error'); return; }
        const p = posts.find(x => x.id == id);
        if (p) {
            if (!p.likes) p.likes = [];
            const i = p.likes.indexOf(u.id);
            if (i === -1) p.likes.push(u.id);
            else p.likes.splice(i, 1);
            await supabase.from('posts').upsert(p);
            renderFeed();
        }
    }
    
    async function deletePost(id) {
        const u = getCurrentUser();
        const p = posts.find(x => x.id == id);
        if (p && u && (u.id === p.authorId || u.isAdmin)) {
            p.deleted = true;
            await supabase.from('posts').upsert(p);
            posts = posts.filter(x => !x.deleted);
            displayedPostsCount = POSTS_PER_PAGE;
            renderFeed();
            showMessage("Пост удален", 'success');
        } else {
            showMessage("Нет прав для удаления", 'error');
        }
    }
    
    async function addComment(id) {
        const inp = document.getElementById('cmt_' + id);
        if (!inp || !inp.value.trim()) return;
        const u = getCurrentUser();
        if (!u) { showMessage("Войдите в аккаунт", 'error'); return; }
        if (!checkRateLimit(u.id, 'COMMENTS')) { showMessage("Слишком много комментариев", 'error'); return; }
        const p = posts.find(x => x.id == id);
        if (p) {
            if (!p.comments) p.comments = [];
            p.comments.push({
                authorId: u.id,
                author: sanitizeInput(u.name, 50),
                text: sanitizeInput(inp.value, 500),
                timestamp: Date.now()
            });
            await supabase.from('posts').upsert(p);
            inp.value = '';
            renderComments(id);
        }

    async function deleteComment(postId, commentIdx) {
        const u = getCurrentUser();
        if (!u) { showMessage("Войдите в аккаунт", 'error'); return; }
        const p = posts.find(x => x.id == postId);
        if (p && p.comments && p.comments[commentIdx]) {
            const comment = p.comments[commentIdx];
            if (u.id === comment.authorId || u.isAdmin) {
                p.comments.splice(commentIdx, 1);
                await supabase.from('posts').upsert(p);
                renderComments(postId);
                showMessage("Комментарий удален", 'success');
            } else {
                showMessage("Нет прав для удаления", 'error');
            }
        }
    }
    
    function renderComments(postId) {
        const container = document.getElementById('comments_' + postId);
        if (!container) return;
        const p = posts.find(x => x.id == postId);
        if (!p) return;
        const cu = getCurrentUser();
        let html = '';
        if (p.comments && p.comments.length > 0) {
            for (let i = 0; i < p.comments.length; i++) {
                const cmt = p.comments[i];
                const canDelComment = cu && (cu.id === cmt.authorId || cu.isAdmin);
                const commentAuthor = getUserById(cmt.authorId);
                if (!commentAuthor) continue;
                const verifiedBadge = commentAuthor.verified ? ' <span class="verified-icon">✔</span>' : '';
                const safeAuthorId = cmt.authorId.replace(/[^a-zA-Z0-9_-]/g, '');
                const safePostId = postId.replace(/[^a-zA-Z0-9_-]/g, '');
                html += `<div class="comment">
                    <div class="comment-avatar" style="background-image:${getAvatarUrl(cmt.authorId)}" data-userid="${safeAuthorId}"></div>
                    <div class="comment-content">
                        <strong data-userid="${safeAuthorId}">${escapeHtml(cmt.author)}${verifiedBadge}</strong>
                        ${processPostText(cmt.text)}
                        <div class="comment-actions">
                            ${canDelComment ? `<button class="comment-action delete" data-postid="${safePostId}" data-commentidx="${i}">Удалить</button>` : ''}
                        </div>
                    </div>
                </div>`;
            }
        } else {
            html = '<div style="color:#666;padding:5px;">Нет комментариев</div>';
        }
        html += `<div class="add-comment">
            <input id="cmt_${escapeAttr(postId)}" class="comment-input" placeholder="Комментарий..." maxlength="500">
            <button class="comment-btn" data-postid="${escapeAttr(postId)}">Ответить</button>
        </div>`;
        container.innerHTML = html;
    }
    
    function processPostText(text) {
        if (!text) return '';
        let processed = escapeHtml(text).replace(/\n/g, '<br>');
        processed = processed.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                            .replace(/(?<!\*)\*([^*]+)\*(?!\*)/g, '<em>$1</em>')
                            .replace(/__([^_]+)__/g, '<u>$1</u>')
                            .replace(/~~([^~]+)~~/g, '<s>$1</s>');
        processed = processed.replace(/(https?:\/\/[^\s<>]+)/g, url => `<a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer nofollow">${escapeHtml(url)}</a>`);
        const mentionRegex = /@([a-zA-Z0-9\u0430-\u044F\u0410-\u042F\u0451\u0401_-]+)/g;
        processed = processed.replace(mentionRegex, (match, username) => {
            const user = users.find(u => u.login && u.login.toLowerCase() === username.toLowerCase() && !u.banned);
            if (user) {
                return `<span class="mention" data-userid="${escapeAttr(user.id)}">@${escapeHtml(username)}</span>`;
            }
            return '@' + escapeHtml(username);
        });
        return processed;
    }
    
    function getFilteredPosts() {
        let filtered = posts.filter(p => !p.deleted);
        filtered = filtered.filter(p => {
            const author = getUserById(p.authorId);
            return author && !author.banned;
        });
        if (viewingUserId) filtered = filtered.filter(p => p.authorId === viewingUserId);
        if (currentFeedMode === 'recent') filtered.sort((a, b) => b.timestamp - a.timestamp);
        else filtered = filtered.sort(() => Math.random() - 0.5);
        return filtered;
    }
    
    function renderFeed() {
        const c = document.getElementById('feedContainer');
        const cu = getCurrentUser();
        const filtered = getFilteredPosts();
        if (!filtered.length) {
            c.innerHTML = '<div style="background:white;padding:20px;text-align:center;">Нет постов</div>';
            return;
        }
        let html = '';
        const postsToShow = filtered.slice(0, displayedPostsCount);
        for (const p of postsToShow) {
            const author = getUserById(p.authorId);
            if (!author) continue;
            const canDel = cu && (cu.id === p.authorId || cu.isAdmin);
            const isLiked = cu && p.likes && p.likes.includes(cu.id);
            const vBadge = author.verified ? ' <span class="verified-icon">✔</span>' : '';
            const isSubscribed = cu && isFollowing(cu.id, p.authorId) && cu.id !== p.authorId;
            const safeAuthorId = p.authorId.replace(/[^a-zA-Z0-9_-]/g, '');
            const safePostId = p.id.toString().replace(/[^a-zA-Z0-9_-]/g, '');
            
            html += `<div class="post" id="post_${escapeAttr(p.id)}">
                <div class="post-header" data-userid="${safeAuthorId}">
                    <div class="post-avatar" style="background-image:${getAvatarUrl(p.authorId)}"></div>
                    <div>
                        <span class="post-author">${escapeHtml(p.authorName || author.name)}${vBadge}</span>
                        <span class="post-time">${formatTime(p.timestamp)}</span>`;
            if (cu && cu.id !== p.authorId) {
                html += `<button class="follow-btn-inline" style="margin-left:8px;background:${isSubscribed ? '#8b9dc3' : '#4267b2'};color:white;border:none;padding:3px 8px;border-radius:3px;cursor:pointer;font-size:10px;" data-authorid="${safeAuthorId}">${isSubscribed ? 'Отписаться' : 'Подписаться'}</button>`;
            }
            html += `</div></div>
                <div class="post-content">${processPostText(p.text || '')}</div>`;
            if (p.photo) html += `<img class="post-photo" src="${escapeAttr(p.photo)}" loading="lazy" alt="Post image">`;
            if (p.audio) html += `<div class="post-audio"><audio controls src="${escapeAttr(p.audio)}" preload="none"></audio></div>`;
            html += `<div class="post-stats">
                    <button class="like-btn like-post-btn ${isLiked ? 'liked' : ''}" data-postid="${safePostId}">Нравится (${p.likes ? p.likes.length : 0})</button>
                    ${canDel ? `<button class="delete-btn delete-post-btn" data-postid="${safePostId}">Удалить пост</button>` : ''}
                </div>
                <button class="show-comments-btn toggle-comments-btn" data-postid="${safePostId}">Комментарии (${p.comments ? p.comments.length : 0})</button>
                <div class="comments-section" id="comments_${escapeAttr(p.id)}" style="display:none;"></div>
            </div>`;
        }
        if (displayedPostsCount < filtered.length) {
            html += `<button class="load-more-btn" onclick="window.loadMorePosts()">Загрузить ещё (${filtered.length - displayedPostsCount})</button>`;
        }
        c.innerHTML = html;
    }
    
    function formatTime(timestamp) {
        const diff = Math.floor((Date.now() - timestamp) / 1000);
        if (diff < 60) return "только что";
        if (diff < 3600) return Math.floor(diff / 60) + " мин назад";
        if (diff < 86400) return Math.floor(diff / 3600) + " ч назад";
        return Math.floor(diff / 86400) + " дн назад";
    }

    function renderSidebar() {

    async function publishPost() {
        if (isPublishing) return;
        const u = getCurrentUser();
        if (!u) { showMessage("Войдите в аккаунт", 'error'); return; }
        if (!checkRateLimit(u.id, 'POSTS')) { showMessage("Слишком много постов. Подождите минуту.", 'error'); return; }
        const txt = document.getElementById('postText').value;
        if (!txt.trim() && !selectedPhoto && !selectedAudio) { showMessage("Напишите текст или добавьте файл", 'error'); return; }
        if (txt.length > SECURITY.MAX_POST_LENGTH) { showMessage("Пост слишком длинный", 'error'); return; }
        
        isPublishing = true;
        document.getElementById('publishBtn').disabled = true;
        
        let img64 = "";
        let aud64 = "";
        
        try {
            if (selectedPhoto) {
                if (selectedPhoto.size > SECURITY.MAX_FILE_SIZE_PHOTO) throw new Error("Фото слишком большое (макс. 5 МБ)");
                if (!SECURITY.ALLOWED_IMAGE_TYPES.includes(selectedPhoto.type)) throw new Error("Неподдерживаемый формат изображения");
                if (!await validateFileMagicBytes(selectedPhoto, 'image')) throw new Error("Файл поврежден или имеет неверный формат");
                img64 = await new Promise(r => { const fr = new FileReader(); fr.onload = e => r(e.target.result); fr.readAsDataURL(selectedPhoto); });
            }
            
            if (selectedAudio) {
                if (selectedAudio.size > SECURITY.MAX_FILE_SIZE_AUDIO) throw new Error("Аудио слишком большое (макс. 10 МБ)");
                if (!SECURITY.ALLOWED_AUDIO_TYPES.includes(selectedAudio.type)) throw new Error("Неподдерживаемый формат аудио");
                if (!await validateFileMagicBytes(selectedAudio, 'audio')) throw new Error("Аудиофайл поврежден или имеет неверный формат");
                aud64 = await new Promise(r => { const fr = new FileReader(); fr.onload = e => r(e.target.result); fr.readAsDataURL(selectedAudio); });
            }
            
            const newPost = {
                id: Date.now().toString(),
                authorId: u.id,
                authorName: sanitizeInput(u.name, 50),
                timestamp: Date.now(),
                text: sanitizeInput(txt, SECURITY.MAX_POST_LENGTH) || "Новый пост",
                photo: img64,
                audio: aud64,
                likes: [],
                comments: [],
                deleted: false
            };
            await supabase.from('posts').upsert(newPost);
            posts.unshift(newPost);
            
            document.getElementById('postText').value = '';
            selectedPhoto = null;
            selectedAudio = null;
            document.getElementById('postImage').value = '';
            document.getElementById('postAudio').value = '';
            document.getElementById('photoPreview').textContent = '';
            document.getElementById('audioPreview').textContent = '';
            document.getElementById('charCounter').textContent = '0 / ' + SECURITY.MAX_POST_LENGTH;
            
            displayedPostsCount = POSTS_PER_PAGE;
            renderFeed();
            showMessage("Опубликовано!", 'success');
        } catch (error) {
            showMessage(error.message, 'error');
        } finally {
            isPublishing = false;
            document.getElementById('publishBtn').disabled = false;
        }
    }

    function parseHash() {
        const h = window.location.hash.substring(1);
        if (h === 'about') { currentTab = 'about'; viewingUserId = null; }
        else if (h === 'rules') { currentTab = 'rules'; viewingUserId = null; }
        else if (h.startsWith('users/')) {
            currentTab = 'feed';
            const login = decodeURIComponent(h.split('/')[1]);
            const user = getUserByLogin(login);
            viewingUserId = user ? user.id : null;

    function formatText(text, format) {
        const ta = document.getElementById('postText');
        const start = ta.selectionStart;
        const end = ta.selectionEnd;
        const selected = text.substring(start, end);
        let replacement;
        if (format === 'bold') replacement = '**' + selected + '**';
        else if (format === 'italic') replacement = '*' + selected + '*';
        else if (format === 'underline') replacement = '__' + selected + '__';
        else replacement = '~~' + selected + '~~';
        return text.substring(0, start) + replacement + text.substring(end);
    }

    function showAccountModal() {
        const u = getCurrentUser();
        if (!u) return;
        
        const lastUpdate = u.lastProfileUpdate || 0;
        const now = Date.now();
        const canUpdate = (now - lastUpdate) >= SECURITY.PROFILE_UPDATE_COOLDOWN;
        const timeLeft = canUpdate ? 0 : (SECURITY.PROFILE_UPDATE_COOLDOWN - (now - lastUpdate));
        const daysLeft = Math.ceil(timeLeft / 86400000);
        
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h3>Управление аккаунтом</h3>
                ${!canUpdate ? `<div class="error-message" style="display:block;margin-bottom:10px;">Изменение данных будет доступно через ${daysLeft} дн.</div>` : ''}
                <div class="account-section">
                    <h4>Изменить имя</h4>
                    <input type="text" id="newName" value="${escapeHtml(u.name)}" maxlength="50" ${!canUpdate ? 'disabled' : ''}>
                    <button id="saveNameBtn" class="auth-btn" ${!canUpdate ? 'disabled' : ''}>Сохранить</button>
                    ${!canUpdate ? '<div class="info-text">Следующая смена имени через ' + daysLeft + ' дн.</div>' : ''}
                </div>
                <div class="account-section">
                    <h4>Изменить логин</h4>
                    <input type="text" id="newLogin" value="${escapeHtml(u.login)}" maxlength="30" ${!canUpdate ? 'disabled' : ''}>
                    <button id="saveLoginBtn" class="auth-btn" ${!canUpdate ? 'disabled' : ''}>Сохранить</button>
                    ${!canUpdate ? '<div class="info-text">Следующая смена логина через ' + daysLeft + ' дн.</div>' : ''}
                </div>
                <div class="account-section">
                    <h4>Изменить пароль</h4>
                    <input type="password" id="newPassword" placeholder="Новый пароль" ${!canUpdate ? 'disabled' : ''}>
                    <input type="password" id="confirmPassword" placeholder="Подтвердите пароль" ${!canUpdate ? 'disabled' : ''}>
                    <button id="savePasswordBtn" class="auth-btn" ${!canUpdate ? 'disabled' : ''}>Сохранить</button>
                    ${!canUpdate ? '<div class="info-text">Следующая смена пароля через ' + daysLeft + ' дн.</div>' : ''}
                </div>
                <button id="deleteAccountBtn" class="delete-account-btn">Удалить аккаунт</button>
                <button id="closeAccountModal" class="auth-btn" style="background:#8b9dc3; width:100%; margin-top:10px;">Закрыть</button>
            </div>
        `;
        document.body.appendChild(modal);
        
        if (canUpdate) {
            document.getElementById('saveNameBtn').onclick = async () => {
                const newName = sanitizeInput(document.getElementById('newName').value, 50);
                if (newName.length < 2) { showMessage("Имя слишком короткое", 'error'); return; }
                u.name = newName;
                u.lastProfileUpdate = Date.now();
                await supabase.from('users').upsert(u);
                modal.remove();
                renderSidebar();
                renderMobile();
                showMessage("Имя обновлено", 'success');
            };
            
            document.getElementById('saveLoginBtn').onclick = async () => {
                const nl = sanitizeInput(document.getElementById('newLogin').value, 30);
                if (!/^[a-zA-Z0-9_-]{3,30}$/.test(nl)) { showMessage("Логин: 3-30 символов (буквы, цифры, _, -)", 'error'); return; }
                if (users.find(x => x.login.toLowerCase() === nl.toLowerCase() && x.id !== u.id)) { showMessage("Логин занят", 'error'); return; }
                u.login = nl;
                u.lastProfileUpdate = Date.now();
                await supabase.from('users').upsert(u);
                modal.remove();
                renderSidebar();
                renderMobile();
                showMessage("Логин обновлен", 'success');
            };
            
            document.getElementById('savePasswordBtn').onclick = async () => {
                const np = document.getElementById('newPassword').value;
                const cp = document.getElementById('confirmPassword').value;
                if (!np || np !== cp) { showMessage("Пароли не совпадают", 'error'); return; }
                if (np.length < SECURITY.MIN_PASSWORD_LENGTH) { showMessage("Пароль: минимум " + SECURITY.MIN_PASSWORD_LENGTH + " символов", 'error'); return; }
                u.password = await hashPassword(np);
                u.lastProfileUpdate = Date.now();
                await supabase.from('users').upsert(u);
                modal.remove();
                showMessage("Пароль обновлен", 'success');
            };
        }
        
        document.getElementById('deleteAccountBtn').onclick = async () => {
            if (confirm("Вы уверены? Это действие нельзя отменить!")) {
                posts = posts.filter(p => p.authorId !== u.id);
                users = users.filter(x => x.id !== u.id);
                await supabase.from('users').delete().eq('id', u.id);
                if (currentUserId === u.id) {
                    currentUserId = null;
                    localStorage.removeItem('rb_session');
                }
                modal.remove();
                render();
            }
        };
        
        document.getElementById('closeAccountModal').onclick = () => modal.remove();
    }

    async function init() {
        if (initialized) return;
        initialized = true;
        document.getElementById('globalLoading').style.display = 'flex';
        await loadSettings();
        
        const [usersRes, postsRes, subsRes] = await Promise.all([
            supabase.from('users').select('*'),
            supabase.from('posts').select('*').order('timestamp', { ascending: false }).limit(100),
            supabase.from('subscriptions').select('*')
        ]);
        
        users = usersRes.data || [];
        posts = (postsRes.data || []).filter(p => !p.deleted);
        if (subsRes.data) {
            subscriptions = {};
            subsRes.data.forEach(item => { subscriptions[item.userId] = item.following || []; });
        }
        
        if (maintenanceMode) {
            const saved = localStorage.getItem('rb_session');
            let isAdminUser = false;
            if (saved) {
                try {
                    const sessionData = JSON.parse(saved);
                    if (sessionData.fingerprint === SECURITY.getFingerprint() && (Date.now() - sessionData.timestamp) < SECURITY.SESSION_TIMEOUT) {
                        const u = users.find(user => user.id === sessionData.userId);
                        if (u && u.isAdmin) isAdminUser = true;
                    } else {
                        localStorage.removeItem('rb_session');
                    }
                } catch (e) {
                    localStorage.removeItem('rb_session');
                }
            }
            if (!isAdminUser) {
                showMaintenanceScreen();
                return;
            }
        }
        
        const existingAdmin = users.find(u => u.id === ADMIN_ID);
        if (!existingAdmin) {
            const h = await hashPassword(ADMIN_PASSWORD);
            const admin = {
                id: ADMIN_ID,
                login: ADMIN_LOGIN,
                password: h,
                name: "RetroBook",
                isAdmin: true,
                verified: true,
                avatar: "",
                banned: false,
                lastProfileUpdate: 0
            };
            await supabase.from('users').upsert(admin);
            users.push(admin);
        }
        
        const saved = localStorage.getItem('rb_session');
        if (saved) {
            try {
                const sessionData = JSON.parse(saved);
                if (sessionData.fingerprint === SECURITY.getFingerprint() && (Date.now() - sessionData.timestamp) < SECURITY.SESSION_TIMEOUT) {
                    const user = users.find(u => u.id === sessionData.userId && !u.banned);
                    if (user) currentUserId = sessionData.userId;
                    else localStorage.removeItem('rb_session');
                } else {
                    localStorage.removeItem('rb_session');
                }
            } catch (e) {
                localStorage.removeItem('rb_session');
            }
        }
        
        setupGlobalDelegation();
        window.addEventListener('hashchange', parseHash);
        
        document.querySelectorAll('.format-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const ta = document.getElementById('postText');
                ta.value = formatText(ta.value, btn.dataset.format);
                ta.focus();
            });
        });
        
        document.getElementById('postText').addEventListener('input', function() {
            document.getElementById('charCounter').textContent = this.value.length + ' / ' + SECURITY.MAX_POST_LENGTH;
        });
        
        document.getElementById('publishBtn').addEventListener('click', publishPost);
        
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentTab = btn.dataset.tab;
                viewingUserId = null;
                window.location.hash = currentTab === 'feed' ? '' : currentTab;
                render();
            });
        });
        
        document.querySelectorAll('.feed-tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.feed-tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFeedMode = btn.dataset.feed;
                displayedPostsCount = POSTS_PER_PAGE;
                renderFeed();
            });
        });
        
        document.getElementById('burgerBtn').addEventListener('click', () => {
            document.getElementById('mobileSidebar').classList.add('open');
            document.getElementById('mobileOverlay').classList.add('open');
        });
        
        document.getElementById('closeMobile').addEventListener('click', () => {
            document.getElementById('mobileSidebar').classList.remove('open');
            document.getElementById('mobileOverlay').classList.remove('open');
        });
        
        document.getElementById('mobileOverlay').addEventListener('click', () => {
            document.getElementById('mobileSidebar').classList.remove('open');
            document.getElementById('mobileOverlay').classList.remove('open');
        });
        
        document.querySelectorAll('.mobile-tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentTab = btn.dataset.tab;
                viewingUserId = null;
                window.location.hash = currentTab === 'feed' ? '' : currentTab;
                document.getElementById('mobileSidebar').classList.remove('open');
                document.getElementById('mobileOverlay').classList.remove('open');
                render();
            });
        });
        
        document.getElementById('postImage').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
                if (file.size > SECURITY.MAX_FILE_SIZE_PHOTO) { showMessage("Файл слишком большой", 'error'); e.target.value = ''; return; }
                if (!SECURITY.ALLOWED_IMAGE_TYPES.includes(file.type)) { showMessage("Неподдерживаемый формат", 'error'); e.target.value = ''; return; }
                if (!await validateFileMagicBytes(file, 'image')) { showMessage("Файл поврежден или имеет неверный формат", 'error'); e.target.value = ''; return; }
                selectedPhoto = file;
                const preview = document.getElementById('photoPreview');
                preview.textContent = '';
                const btn = document.createElement('button');
                btn.className = 'remove-file-btn';
                btn.textContent = 'Удалить';
                btn.onclick = window.clearPhoto;
                preview.appendChild(document.createTextNode('Файл выбран '));
                preview.appendChild(btn);
            }
        });
        
        document.getElementById('postAudio').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
                if (file.size > SECURITY.MAX_FILE_SIZE_AUDIO) { showMessage("Файл слишком большой", 'error'); e.target.value = ''; return; }
                if (!SECURITY.ALLOWED_AUDIO_TYPES.includes(file.type)) { showMessage("Неподдерживаемый формат", 'error'); e.target.value = ''; return; }
                if (!await validateFileMagicBytes(file, 'audio')) { showMessage("Аудиофайл поврежден или имеет неверный формат", 'error'); e.target.value = ''; return; }
                selectedAudio = file;
                const preview = document.getElementById('audioPreview');
                preview.textContent = '';
                const btn = document.createElement('button');
                btn.className = 'remove-file-btn';
                btn.textContent = 'Удалить';
                btn.onclick = window.clearAudio;
                preview.appendChild(document.createTextNode('Файл выбран '));
                preview.appendChild(btn);
            }
        });
        
        document.getElementById('mainLogoBtn').addEventListener('click', window.goToMain);
        
        setTimeout(() => parseHash(), 10);
    }
    
    init();
</script>
</body>
</html>
