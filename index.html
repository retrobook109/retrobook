<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>RetroBook — социальная сеть 2011</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #e9eaed;
            font-family: 'lucida grande', tahoma, verdana, arial, sans-serif;
            font-size: 12px;
            color: #1d2129;
            line-height: 1.34;
        }

        .rb-wrapper {
            max-width: 980px;
            margin: 0 auto;
            padding: 0 10px;
        }

        .rb-header {
            background: #3b5998;
            border-bottom: 1px solid #133783;
            padding: 8px 0;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .header-inner {
            max-width: 980px;
            margin: 0 auto;
            padding: 0 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: white;
            text-shadow: 0 1px 0 #133783;
            letter-spacing: -0.5px;
            cursor: pointer;
        }

        .auth-area {
            display: flex;
            gap: 8px;
            align-items: center;
            background: #2d4373;
            padding: 5px 12px;
            border-radius: 4px;
            flex-wrap: wrap;
        }

        .auth-input {
            padding: 4px 8px;
            border-radius: 3px;
            border: none;
            font-size: 11px;
            width: 110px;
        }

        .auth-btn {
            background: #5b74a8;
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
        }

        .auth-btn:hover { background: #4b6a9c; }
        .logout-btn { background: #dd3b3b; }
        .logout-btn:hover { background: #b32d2d; }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #2d4373;
            padding: 4px 12px;
            border-radius: 20px;
            color: white;
            font-size: 12px;
        }

        .admin-panel-btn {
            background: #ffb347;
            border: none;
            color: #2c2c2c;
            padding: 4px 12px;
            border-radius: 3px;
            font-weight: bold;
            cursor: pointer;
            font-size: 11px;
        }

        .rb-main {
            padding-top: 65px;
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .sidebar {
            width: 210px;
            flex-shrink: 0;
        }

        .profile-card {
            background: white;
            border: 1px solid #bdc7d8;
            border-radius: 3px;
            margin-bottom: 15px;
            padding: 12px;
            text-align: center;
        }

        .avatar-wrapper {
            position: relative;
            display: inline-block;
            cursor: pointer;
        }
        .avatar {
            width: 80px;
            height: 80px;
            background: #dddfe2;
            border-radius: 50%;
            margin: 0 auto 8px;
            background-size: cover;
            background-position: center;
            border: 2px solid #ddd;
            transition: 0.1s;
        }
        .avatar:hover { opacity: 0.85; border-color: #3b5998; }
        .avatar-hint {
            font-size: 9px;
            color: #666;
            margin-top: 4px;
        }

        .change-avatar-btn {
            background: #e9eaed;
            border: 1px solid #bdc7d8;
            padding: 4px 10px;
            border-radius: 3px;
            font-size: 10px;
            cursor: pointer;
            margin-top: 6px;
            display: inline-block;
        }
        .change-avatar-btn:hover { background: #d0d1d5; }

        .profile-name { font-weight: bold; font-size: 13px; margin-top: 5px; }
        .feed { flex: 1; }

        .post {
            background: white;
            border: 1px solid #bdc7d8;
            border-radius: 3px;
            margin-bottom: 12px;
            padding: 12px;
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .post-avatar {
            width: 40px;
            height: 40px;
            background: #dddfe2;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
        }

        .post-author {
            font-weight: bold;
            font-size: 13px;
        }

        .post-time {
            color: #616770;
            font-size: 10px;
            margin-left: 6px;
        }

        .verified-badge {
            display: inline-block;
            background: #3b5998;
            color: white;
            font-size: 9px;
            padding: 1px 5px;
            border-radius: 10px;
            margin-left: 5px;
        }

        .post-content { margin: 8px 0; font-size: 13px; }
        .post-photo { max-width: 100%; max-height: 350px; border-radius: 3px; margin-top: 8px; border: 1px solid #ddd; }

        .post-stats {
            border-top: 1px solid #e9eaed;
            border-bottom: 1px solid #e9eaed;
            padding: 6px 0;
            margin: 8px 0;
            display: flex;
            gap: 15px;
        }

        .like-btn {
            background: none;
            border: none;
            color: #4267b2;
            font-weight: bold;
            cursor: pointer;
            font-size: 11px;
        }

        .comments-section { margin-top: 8px; }
        .comment {
            background: #f6f7f9;
            border-radius: 3px;
            padding: 6px 8px;
            margin: 5px 0;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .comment-avatar {
            width: 28px;
            height: 28px;
            background: #dddfe2;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            flex-shrink: 0;
        }
        .comment-content { flex: 1; }
        .comment strong { color: #3b5998; }

        .add-comment {
            margin-top: 8px;
            display: flex;
            gap: 6px;
        }

        .comment-input {
            flex: 1;
            border: 1px solid #bdc7d8;
            border-radius: 3px;
            padding: 5px;
            font-size: 11px;
        }

        .comment-btn {
            background: #4267b2;
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 3px;
            cursor: pointer;
        }

        .admin-panel {
            position: fixed;
            right: -300px;
            top: 55px;
            width: 280px;
            background: white;
            border-left: 1px solid #ccc;
            border-bottom: 1px solid #ccc;
            border-radius: 0 0 0 8px;
            padding: 15px;
            transition: 0.25s ease;
            z-index: 200;
            box-shadow: -2px 2px 10px rgba(0,0,0,0.1);
        }

        .admin-panel.open { right: 0; }
        .close-admin {
            text-align: right;
            font-size: 18px;
            cursor: pointer;
            margin-bottom: 8px;
        }

        .admin-list {
            max-height: 280px;
            overflow-y: auto;
            margin: 10px 0;
        }

        .admin-post-item {
            background: #f6f7f9;
            margin: 6px 0;
            padding: 6px;
            border-radius: 3px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .delete-post-btn {
            background: #dd3b3b;
            border: none;
            color: white;
            padding: 3px 8px;
            border-radius: 3px;
            cursor: pointer;
        }

        .new-post-area {
            background: white;
            border: 1px solid #bdc7d8;
            border-radius: 3px;
            padding: 12px;
            margin-bottom: 15px;
        }

        .new-post-input, .new-post-file {
            width: 100%;
            padding: 6px;
            margin-bottom: 8px;
            border: 1px solid #ccc;
            border-radius: 3px;
            font-size: 12px;
        }

        .new-post-btn {
            background: #4267b2;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 3px;
            cursor: pointer;
        }

        .info-message {
            background: #fff9c4;
            border: 1px solid #f9e45b;
            border-radius: 3px;
            padding: 10px;
            margin-bottom: 12px;
            text-align: center;
            font-size: 12px;
            color: #5d4a00;
        }

        .user-select {
            width: 100%;
            padding: 5px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 3px;
            font-size: 11px;
        }

        .give-badge-btn {
            background: #3b5998;
            color: white;
            border: none;
            padding: 6px;
            width: 100%;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
            margin-top: 5px;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-card {
            background: white;
            width: 340px;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .modal-card h3 { margin-bottom: 15px; }
        .modal-card input {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .modal-card button {
            margin: 5px;
            padding: 6px 12px;
            cursor: pointer;
        }

        .avatar-upload-preview {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #dddfe2;
            margin: 10px auto;
            background-size: cover;
            background-position: center;
        }

        @media (max-width: 750px) { .sidebar { display: none; } }
    </style>
</head>
<body>

<div class="rb-header">
    <div class="header-inner">
        <div class="logo" onclick="location.reload()">RetroBook</div>
        <div id="authWidget"></div>
    </div>
</div>

<div class="rb-wrapper">
    <div class="rb-main">
        <div class="sidebar">
            <div class="profile-card" id="profileCard">
                <div class="avatar-wrapper" id="avatarWrapper">
                    <div class="avatar" id="profileAvatar"></div>
                </div>
                <div class="profile-name" id="profileName">Гость</div>
                <div id="profileStatus" style="font-size:10px; color:#666;">не авторизован</div>
                <div id="changeAvatarBtnContainer" style="margin-top: 6px;"></div>
            </div>
            <div style="background:white; border:1px solid #bdc7d8; border-radius:3px; padding:10px;">
                <b>RetroBook 2011</b><br>
                Лента постов<br>
                Лайки и комментарии<br>
                Загрузка фото<br>
                Смена аватарки<br>
                Админ-панель
            </div>
        </div>
        <div class="feed">
            <div id="infoMessage" class="info-message" style="display: none;"></div>
            <div id="newPostBlock" style="display:none;" class="new-post-area">
                <textarea id="newPostText" class="new-post-input" rows="2" placeholder="Что у вас нового?"></textarea>
                <input type="file" id="newPostImage" class="new-post-file" accept="image/*">
                <button id="createPostBtn" class="new-post-btn">Опубликовать</button>
            </div>
            <div id="feedContainer"></div>
        </div>
    </div>
</div>

<div class="admin-panel" id="adminPanel">
    <div class="close-admin" id="closeAdminBtn">X</div>
    <h3>Админ-панель (RetroBook)</h3>
    <div><strong>Удалить пост:</strong></div>
    <div class="admin-list" id="adminPostList"></div>
    <div style="margin-top:12px; border-top:1px solid #ddd; padding-top:10px;">
        <div><strong>Выдать синюю галочку пользователю:</strong></div>
        <select id="userToVerify" class="user-select"></select>
        <button id="giveBadgeBtn" class="give-badge-btn">Выдать верификацию</button>
    </div>
</div>

<script>
// Добавьте в начало функции init() или в начало скрипта
const path = window.location.pathname;
if (path.startsWith('/users/')) {
    // Оставляем как есть, ваш код уже обрабатывает такие URL
    console.log('User page:', path);
}

    // === ХРАНИЛИЩЕ ДАННЫХ (localStorage) ===
    let users = [];
    let posts = [];
    let currentUserId = null;

    const ADMIN_ID = "retrobook_admin";
    const ADMIN_LOGIN = "RetroBook";
    const ADMIN_PASSWORD = "20148812Gl";
    const ADMIN_NAME = "RetroBook";

    let nextUserId = 100;

    function initData() {
        const storedUsers = localStorage.getItem('retrobook_users');
        const storedPosts = localStorage.getItem('retrobook_posts');
        const storedSession = localStorage.getItem('retrobook_session');

        if (storedUsers) {
            users = JSON.parse(storedUsers);
            const adminExists = users.find(u => u.id === ADMIN_ID);
            if (!adminExists) {
                users.unshift({
                    id: ADMIN_ID,
                    login: ADMIN_LOGIN,
                    password: ADMIN_PASSWORD,
                    name: ADMIN_NAME,
                    isAdmin: true,
                    verified: true,
                    avatar: ""
                });
                saveUsers();
            } else {
                adminExists.password = ADMIN_PASSWORD;
                adminExists.isAdmin = true;
                adminExists.verified = true;
                saveUsers();
            }
        } else {
            users = [{
                id: ADMIN_ID,
                login: ADMIN_LOGIN,
                password: ADMIN_PASSWORD,
                name: ADMIN_NAME,
                isAdmin: true,
                verified: true,
                avatar: ""
            }];
            saveUsers();
        }

        if (storedPosts) {
            posts = JSON.parse(storedPosts);
        } else {
            posts = [
                { 
                    id: "p1_" + Date.now(), 
                    authorId: ADMIN_ID, 
                    authorName: ADMIN_NAME, 
                    verified: true, 
                    time: "только что", 
                    text: "Добро пожаловать в RetroBook! Администратор может удалять посты и выдавать галочки другим пользователям.", 
                    photoBase64: "", 
                    likes: [], 
                    comments: [] 
                },
                { 
                    id: "p2_" + (Date.now()+1), 
                    authorId: ADMIN_ID, 
                    authorName: ADMIN_NAME, 
                    verified: true, 
                    time: "1 минуту назад", 
                    text: "Загружайте фото прямо с компьютера. Теперь можно менять аватарку! Нажмите на аватар в профиле.", 
                    photoBase64: "", 
                    likes: [], 
                    comments: [] 
                }
            ];
            savePosts();
        }

        if (storedSession) {
            currentUserId = storedSession;
            if (!users.find(u => u.id === currentUserId)) currentUserId = null;
        }
    }

    function saveUsers() { localStorage.setItem('retrobook_users', JSON.stringify(users)); }
    function savePosts() { localStorage.setItem('retrobook_posts', JSON.stringify(posts)); }
    function saveSession() { if(currentUserId) localStorage.setItem('retrobook_session', currentUserId); else localStorage.removeItem('retrobook_session'); }

    function getCurrentUser() {
        if (!currentUserId) return null;
        return users.find(u => u.id === currentUserId);
    }

    function getUserById(userId) {
        return users.find(u => u.id === userId);
    }

    function isAdmin() {
        const u = getCurrentUser();
        return u && u.isAdmin === true;
    }

    function getDefaultAvatarSvg() {
        return "url('data:image/svg+xml;utf8,<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 24 24\" fill=\"%23899ab6\"><path d=\"M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z\"/></svg>')";
    }

    function getUserAvatarUrl(userId) {
        const user = getUserById(userId);
        if (user && user.avatar && user.avatar.startsWith('data:image')) {
            return `url('${user.avatar}')`;
        }
        return getDefaultAvatarSvg();
    }

    function updateAvatar(userId, avatarBase64) {
        const user = users.find(u => u.id === userId);
        if (user && avatarBase64 && avatarBase64.startsWith('data:image')) {
            user.avatar = avatarBase64;
            saveUsers();
            renderAll();
            showTemporaryMessage("Аватарка обновлена!");
        }
    }

    function showAvatarUploadModal() {
        const user = getCurrentUser();
        if (!user) { showTemporaryMessage("Войдите в аккаунт!"); return; }
        
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="modal-card">
                <h3>Сменить аватарку</h3>
                <div class="avatar-upload-preview" id="avatarPreview" style="background-image: ${getUserAvatarUrl(user.id)}; background-size: cover;"></div>
                <input type="file" id="avatarFileInput" accept="image/jpeg,image/png,image/gif">
                <button id="uploadAvatarBtn" class="auth-btn">Загрузить</button>
                <button id="cancelAvatarBtn" class="auth-btn" style="background:#aaa;">Отмена</button>
            </div>
        `;
        document.body.appendChild(modal);
        
        const fileInput = document.getElementById('avatarFileInput');
        const preview = document.getElementById('avatarPreview');
        
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                if (file.size > 2 * 1024 * 1024) {
                    showTemporaryMessage("Файл слишком большой (макс. 2MB)");
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(ev) {
                    preview.style.backgroundImage = `url('${ev.target.result}')`;
                };
                reader.readAsDataURL(file);
            }
        });
        
        document.getElementById('uploadAvatarBtn').onclick = () => {
            const file = fileInput.files[0];
            if (file) {
                if (file.size > 2 * 1024 * 1024) {
                    showTemporaryMessage("Файл слишком большой (макс. 2MB)");
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(ev) {
                    updateAvatar(user.id, ev.target.result);
                    modal.remove();
                };
                reader.readAsDataURL(file);
            } else {
                showTemporaryMessage("Выберите файл");
            }
        };
        document.getElementById('cancelAvatarBtn').onclick = () => modal.remove();
    }

    function createPost(text, photoBase64) {
        const user = getCurrentUser();
        if (!user) { showTemporaryMessage("Войдите в аккаунт, чтобы писать посты!"); return false; }
        if (!text.trim() && !photoBase64) return false;
        const newPost = {
            id: Date.now() + "_" + Math.random(),
            authorId: user.id,
            authorName: user.name,
            verified: user.verified || user.isAdmin,
            time: "только что",
            text: text.trim() || "Фото",
            photoBase64: photoBase64 || "",
            likes: [],
            comments: []
        };
        posts.unshift(newPost);
        savePosts();
        renderAll();
        return true;
    }

    function deletePost(postId) {
        if (!isAdmin()) { showTemporaryMessage("Только администратор может удалять посты!"); return; }
        posts = posts.filter(p => p.id !== postId);
        savePosts();
        renderAll();
    }

    function toggleLike(postId) {
        const user = getCurrentUser();
        if (!user) { showTemporaryMessage("Войдите, чтобы ставить лайки!"); return false; }
        const post = posts.find(p => p.id === postId);
        if (!post) return;
        const idx = post.likes.indexOf(user.id);
        if (idx === -1) post.likes.push(user.id);
        else post.likes.splice(idx, 1);
        savePosts();
        renderAll();
    }

    function addComment(postId, text) {
        const user = getCurrentUser();
        if (!user) { showTemporaryMessage("Войдите, чтобы комментировать!"); return false; }
        if (!text.trim()) return;
        const post = posts.find(p => p.id === postId);
        if (post) {
            post.comments.push({
                authorId: user.id,
                author: user.name,
                verified: user.verified || user.isAdmin,
                text: text.trim()
            });
            savePosts();
            renderAll();
        }
    }

    function giveVerificationToUser(userId) {
        if (!isAdmin()) { showTemporaryMessage("Только администратор может выдавать галочки!"); return; }
        const targetUser = users.find(u => u.id === userId);
        if (!targetUser) { showTemporaryMessage("Пользователь не найден"); return; }
        if (targetUser.verified) {
            showTemporaryMessage("У этого пользователя уже есть галочка");
            return;
        }
        targetUser.verified = true;
        posts.forEach(post => {
            if (post.authorId === userId) post.verified = true;
            post.comments.forEach(c => { if (c.authorId === userId) c.verified = true; });
        });
        saveUsers();
        savePosts();
        renderAll();
        showTemporaryMessage("Галочка выдана пользователю " + targetUser.name);
    }

    function register(login, password, name) {
        if (users.find(u => u.login === login)) {
            showTemporaryMessage("Логин уже занят!");
            return false;
        }
        if (login.length < 3) { showTemporaryMessage("Логин должен быть не менее 3 символов"); return false; }
        if (password.length < 3) { showTemporaryMessage("Пароль должен быть не менее 3 символов"); return false; }
        if (name.length < 2) { showTemporaryMessage("Введите корректное имя"); return false; }
        
        const newId = "user_" + (nextUserId++);
        const newUser = {
            id: newId,
            login: login,
            password: password,
            name: name,
            isAdmin: false,
            verified: false,
            avatar: ""
        };
        users.push(newUser);
        saveUsers();
        showTemporaryMessage("Регистрация успешна! Теперь войдите.");
        return true;
    }

    function login(login, password) {
        const user = users.find(u => u.login === login && u.password === password);
        if (!user) {
            showTemporaryMessage("Неверный логин или пароль");
            return false;
        }
        currentUserId = user.id;
        saveSession();
        renderAll();
        showTemporaryMessage("Добро пожаловать, " + user.name + "!");
        return true;
    }

    function logout() {
        currentUserId = null;
        saveSession();
        renderAll();
    }

    function showRegisterModal() {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="modal-card">
                <h3>Регистрация RetroBook</h3>
                <input type="text" id="regLogin" placeholder="Логин" autocomplete="off">
                <input type="password" id="regPassword" placeholder="Пароль">
                <input type="text" id="regName" placeholder="Ваше имя">
                <button id="regSubmitBtn" class="auth-btn">Зарегистрироваться</button>
                <button id="regCancelBtn" class="auth-btn" style="background:#aaa;">Отмена</button>
            </div>
        `;
        document.body.appendChild(modal);
        document.getElementById('regSubmitBtn').onclick = () => {
            const loginVal = document.getElementById('regLogin').value.trim();
            const passVal = document.getElementById('regPassword').value;
            const nameVal = document.getElementById('regName').value.trim();
            if (loginVal && passVal && nameVal) {
                register(loginVal, passVal, nameVal);
                modal.remove();
            } else {
                showTemporaryMessage("Заполните все поля");
            }
        };
        document.getElementById('regCancelBtn').onclick = () => modal.remove();
    }

    function showTemporaryMessage(msg, isError = false) {
        const msgDiv = document.getElementById('infoMessage');
        if (msgDiv) {
            msgDiv.style.display = 'block';
            msgDiv.style.background = isError ? '#ffebee' : '#fff9c4';
            msgDiv.style.borderColor = isError ? '#f44336' : '#f9e45b';
            msgDiv.innerText = msg;
            setTimeout(() => { msgDiv.style.display = 'none'; }, 3000);
        } else {
            alert(msg);
        }
    }

    function renderAuthWidget() {
        const container = document.getElementById('authWidget');
        const user = getCurrentUser();
        if (!user) {
            container.innerHTML = `
                <div class="auth-area">
                    <input type="text" id="loginInput" class="auth-input" placeholder="Логин">
                    <input type="password" id="passwordInput" class="auth-input" placeholder="Пароль">
                    <button id="doLoginBtn" class="auth-btn">Войти</button>
                    <button id="showRegisterBtn" class="auth-btn">Регистрация</button>
                </div>
            `;
            document.getElementById('doLoginBtn')?.addEventListener('click', () => {
                const log = document.getElementById('loginInput').value.trim();
                const pass = document.getElementById('passwordInput').value;
                if (log && pass) login(log, pass);
                else showTemporaryMessage("Введите логин и пароль");
            });
            document.getElementById('showRegisterBtn')?.addEventListener('click', showRegisterModal);
        } else {
            container.innerHTML = `
                <div class="user-info">
                    <span>${user.name} ${user.verified ? '[ПОДТВЕРЖДЕН]' : ''} ${user.isAdmin ? '[АДМИН]' : ''}</span>
                    <button id="logoutBtn" class="auth-btn logout-btn">Выйти</button>
                    ${user.isAdmin ? '<button id="openAdminBtn" class="admin-panel-btn">Админка</button>' : ''}
                </div>
            `;
            document.getElementById('logoutBtn')?.addEventListener('click', logout);
            if (user.isAdmin) {
                document.getElementById('openAdminBtn')?.addEventListener('click', () => {
                    document.getElementById('adminPanel').classList.add('open');
                });
            }
        }
    }

    function renderFeed() {
        const container = document.getElementById('feedContainer');
        if (!container) return;
        if (posts.length === 0) {
            container.innerHTML = '<div style="background:white; padding:20px; text-align:center;">Нет постов. Создайте первый!</div>';
            return;
        }
        let html = '';
        for (let post of posts) {
            const verifiedBadge = post.verified ? '<span class="verified-badge">ПОДТВЕРЖДЕН</span>' : '';
            const photoHtml = post.photoBase64 ? `<img class="post-photo" src="${post.photoBase64}" alt="фото">` : '';
            const likesCount = post.likes.length;
            const user = getCurrentUser();
            const likedByMe = user && post.likes.includes(user.id);
            const likeText = likedByMe ? "НРАВИТСЯ" : "НРАВИТСЯ";
            let commentsHtml = '';
            for (let com of post.comments) {
                const comBadge = com.verified ? '<span class="verified-badge" style="background:#8b9dc3;">ПОДТВЕРЖДЕН</span>' : '';
                const commentAvatar = getUserAvatarUrl(com.authorId);
                commentsHtml += `
                    <div class="comment">
                        <div class="comment-avatar" style="background-image: ${commentAvatar};"></div>
                        <div class="comment-content">
                            <strong>${escapeHtml(com.author)} ${comBadge}</strong> ${escapeHtml(com.text)}
                        </div>
                    </div>
                `;
            }
            commentsHtml += `
                <div class="add-comment">
                    <input type="text" id="comment_${post.id}" class="comment-input" placeholder="Написать комментарий...">
                    <button class="comment-btn" onclick="submitCommentProxy('${post.id}')">Ответить</button>
                </div>
            `;

            const authorAvatar = getUserAvatarUrl(post.authorId);
            html += `
                <div class="post">
                    <div class="post-header">
                        <div class="post-avatar" style="background-image: ${authorAvatar};"></div>
                        <div>
                            <span class="post-author">${escapeHtml(post.authorName)} ${verifiedBadge}</span>
                            <span class="post-time">${escapeHtml(post.time)}</span>
                        </div>
                    </div>
                    <div class="post-content">${escapeHtml(post.text)}</div>
                    ${photoHtml}
                    <div class="post-stats">
                        <button class="like-btn" onclick="handleLikeProxy('${post.id}')">${likeText} (${likesCount})</button>
                        <span>КОММЕНТАРИЕВ: ${post.comments.length}</span>
                    </div>
                    <div class="comments-section">${commentsHtml}</div>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    window.handleLikeProxy = (id) => toggleLike(id);
    window.submitCommentProxy = (id) => {
        const input = document.getElementById(`comment_${id}`);
        if (input) addComment(id, input.value);
        if (input) input.value = '';
    };

    function renderProfile() {
        const user = getCurrentUser();
        const avatarDiv = document.getElementById('profileAvatar');
        const nameSpan = document.getElementById('profileName');
        const statusSpan = document.getElementById('profileStatus');
        const btnContainer = document.getElementById('changeAvatarBtnContainer');
        const avatarWrapper = document.getElementById('avatarWrapper');
        
        if (user) {
            avatarDiv.style.backgroundImage = getUserAvatarUrl(user.id);
            nameSpan.innerText = user.name;
            statusSpan.innerText = user.isAdmin ? "Администратор" : (user.verified ? "Верифицирован" : "Пользователь");
            btnContainer.innerHTML = '<button class="change-avatar-btn" id="changeAvatarBtn">Сменить аватар</button>';
            document.getElementById('changeAvatarBtn')?.addEventListener('click', showAvatarUploadModal);
            avatarWrapper.style.cursor = 'pointer';
            avatarWrapper.onclick = showAvatarUploadModal;
        } else {
            avatarDiv.style.backgroundImage = getDefaultAvatarSvg();
            nameSpan.innerText = "Гость";
            statusSpan.innerText = "не авторизован";
            btnContainer.innerHTML = '';
            avatarWrapper.style.cursor = 'default';
            avatarWrapper.onclick = null;
        }
    }

    function renderNewPostBlock() {
        const block = document.getElementById('newPostBlock');
        if (getCurrentUser()) block.style.display = "block";
        else block.style.display = "none";
    }

    function renderAdminPanel() {
        if (!isAdmin()) {
            document.getElementById('adminPostList').innerHTML = '<div style="color:gray;">Доступно только администратору</div>';
            return;
        }
        let html = '';
        for (let p of posts) {
            let short = p.text.length > 45 ? p.text.substr(0,45)+'...' : p.text;
            html += `<div class="admin-post-item"><div><b>${escapeHtml(p.authorName)}</b>: ${escapeHtml(short)}</div><button class="delete-post-btn" data-id="${p.id}">УДАЛИТЬ</button></div>`;
        }
        document.getElementById('adminPostList').innerHTML = html;
        document.querySelectorAll('.delete-post-btn').forEach(btn => {
            btn.addEventListener('click', (e) => { deletePost(btn.getAttribute('data-id')); e.stopPropagation(); });
        });

        const select = document.getElementById('userToVerify');
        if (select) {
            const nonVerifiedUsers = users.filter(u => !u.isAdmin && !u.verified);
            if (nonVerifiedUsers.length === 0) {
                select.innerHTML = '<option value="">Нет пользователей для верификации</option>';
            } else {
                select.innerHTML = nonVerifiedUsers.map(u => `<option value="${u.id}">${escapeHtml(u.name)} (${escapeHtml(u.login)})</option>`).join('');
            }
        }
    }

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }

    function renderAll() {
        renderAuthWidget();
        renderProfile();
        renderNewPostBlock();
        renderFeed();
        renderAdminPanel();
    }

    document.addEventListener('click', (e) => {
        if (e.target.id === 'createPostBtn') {
            const text = document.getElementById('newPostText').value;
            const fileInput = document.getElementById('newPostImage');
            const file = fileInput.files[0];
            if (file) {
                if (file.size > 5 * 1024 * 1024) {
                    showTemporaryMessage("Файл слишком большой (макс. 5MB)");
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(ev) {
                    createPost(text, ev.target.result);
                    document.getElementById('newPostText').value = '';
                    fileInput.value = '';
                };
                reader.readAsDataURL(file);
            } else {
                createPost(text, "");
                document.getElementById('newPostText').value = '';
            }
        }
    });

    document.getElementById('closeAdminBtn')?.addEventListener('click', () => {
        document.getElementById('adminPanel').classList.remove('open');
    });
    document.getElementById('giveBadgeBtn')?.addEventListener('click', () => {
        const select = document.getElementById('userToVerify');
        if (select && select.value) {
            giveVerificationToUser(select.value);
        } else {
            showTemporaryMessage("Нет доступных пользователей для верификации");
        }
    });

    initData();
    renderAll();
</script>
</body>
</html>
