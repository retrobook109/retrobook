    async function hashPassword(password) {
        const encoder = new TextEncoder();
        const data = encoder.encode(password + 'retrobook_salt_2024');
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        const hashArray = Array.from(new Uint8Array(hashBuffer));

    }

    async function verifyPassword(password, hash) {
        const hashedInput = await hashPassword(password);

    function escapeHtml(s) {
        if (!s) return '';
        return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
    }

    function showMessage(msg, type='info') {

    function checkLoginAttempts(login) {
        const now = Date.now();
        const attempts = loginAttempts[login] || [];
        const recent = attempts.filter(t => now - t < LOGIN_BLOCK_TIME);
        loginAttempts[login] = recent;
        if (recent.length >= MAX_LOGIN_ATTEMPTS) {
            const timeLeft = Math.ceil((LOGIN_BLOCK_TIME - (now - recent[0])) / 60000);
            return { allowed: false, timeLeft };
        }
        return { allowed: true };
    }

    function recordLoginAttempt(login, success) {
        if (!loginAttempts[login]) loginAttempts[login] = [];

        } else {

    function formatTime(ts) {
        const diff = Math.floor((Date.now() - ts)/1000);
        if (diff<60) return 'только что';
        if (diff<3600) return Math.floor(diff/60)+' мин назад';
        if (diff<86400) return Math.floor(diff/3600)+' ч назад';
        return new Date(ts).toLocaleDateString();
    }

    function getRecommendedPosts() {
        const currentUser = getCurrentUser();
        if (!currentUser) return [];
        
        const userLikedPosts = posts.filter(p => p.likes && p.likes.includes(currentUser.id));
        const userSubscriptions = subscriptions[currentUser.id] || [];
        
        const likedKeywords = new Map();
        userLikedPosts.forEach(post => {
            const words = post.text.toLowerCase().split(/\s+/);
            words.forEach(word => {
                if (word.length > 3) {
                    likedKeywords.set(word, (likedKeywords.get(word) || 0) + 1);
                }
            });
        });
        
        const scoredPosts = posts
            .filter(p => {
                if (p.authorId === currentUser.id) return false;
                if (getUserById(p.authorId)?.banned) return false;
                if (p.likes && p.likes.includes(currentUser.id)) return false;
                return true;
            })
            .map(post => {
                let score = 0;
                if (userSubscriptions.includes(post.authorId)) score += 10;
                const postWords = post.text.toLowerCase().split(/\s+/);
                postWords.forEach(word => { if (likedKeywords.has(word)) score += likedKeywords.get(word) * 0.5; });
                const authorSubs = subscriptions[post.authorId] || [];
                if (authorSubs.some(sub => userSubscriptions.includes(sub))) score += 3;
                score += Math.min((post.likes?.length || 0) * 0.2, 5);
                const hoursOld = (Date.now() - post.timestamp) / (1000 * 60 * 60);
                score += Math.max(5 - hoursOld * 0.1, 0);
                if (post.verified || getUserById(post.authorId)?.verified) score += 2;
                return { post, score };
            })
            .filter(item => item.score > 0)
            .sort((a, b) => b.score - a.score);
        
        return scoredPosts.slice(0, 50).map(item => item.post);
    }

    async function updatePostsVerification(userId, verified) {
        const userPosts = posts.filter(p => p.authorId === userId);
        for (const post of userPosts) {
            post.verified = verified;
            await supabase.from('posts').update({ verified }).eq('id', post.id);
        }
        for (const post of posts) {
            if (post.comments) {
                let updated = false;
                for (const comment of post.comments) {
                    if (comment.authorId === userId) {
                        comment.verified = verified;
                        updated = true;
                    }
                }
                if (updated) {
                    await supabase.from('posts').update({ comments: post.comments }).eq('id', post.id);
                }
            }
        }
        await loadAllData();
    }

    async function loadAllData() {
        isLoading = true;
        try {
            const [u, p, s, n, set] = await Promise.all([
                supabase.from('users').select('*'),
                supabase.from('posts').select('*').order('timestamp',{ascending:false}),
                supabase.from('subscriptions').select('*'),
                supabase.from('notifications').select('*').order('timestamp',{ascending:false}),
                supabase.from('settings').select('*').eq('key','main').maybeSingle()
            ]);
            if (u.data) users = u.data;
            if (p.data) posts = p.data;
            if (s.data) { subscriptions = {}; s.data.forEach(i=>subscriptions[i.userId]=i.following||[]); }
            if (n.data) notifications = n.data;
            if (set.data) { aboutText = set.data.aboutText||aboutText; rulesText = set.data.rulesText||rulesText; }
        } catch(e) { console.warn('Офлайн-режим'); }
        isLoading = false;
        dataLoaded = true;
        ensureAdmin();
        return true;
    }

    async function ensureAdmin() {
        if (!users.find(u=>u.id===ADMIN_ID)) {
            const adminHash = await hashPassword('admin');
            await supabase.from('users').upsert({
                id: ADMIN_ID, login: 'RetroBook', password: adminHash, name: 'RetroBook',
                isAdmin: true, verified: true, avatar: '', banned: false
            });
            await loadAllData();
        }
    }

        const c = document.getElementById('authWidget');

            document.getElementById('doLogin').onclick = async () => {
                const login = document.getElementById('logLogin').value.trim();
                const pass = document.getElementById('logPass').value;
                
                const attemptCheck = checkLoginAttempts(login);
                if (!attemptCheck.allowed) {
                    return showMessage(`Слишком много попыток. Подождите ${attemptCheck.timeLeft} мин`, 'error');
                }
                
                const user = users.find(x=>x.login === login);
                if (!user) {
                    recordLoginAttempt(login, false);
                    return showMessage('Неверный логин или пароль','error');
                }
                
                const passwordValid = await verifyPassword(pass, user.password);
                if (!passwordValid) {
                    recordLoginAttempt(login, false);
                    return showMessage('Неверный логин или пароль','error');
                }
                
                if (user.banned) return alert('Аккаунт заблокирован!');
                
                recordLoginAttempt(login, true);
                currentUserId = user.id;
                localStorage.setItem('rb_session', user.id);

    function formatText(t) {
        t = escapeHtml(t);
        t = t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/__(.+?)__/g,'<u>$1</u>').replace(/~~(.+?)~~/g,'<s>$1</s>');
        return t.replace(/\n/g,'<br>').replace(/(https?:\/\/[^\s<>]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');
    }

    function parseMentions(t, pid) {
        return t.replace(/@([a-zA-Z0-9_]+)/g, '<span class="mention" onclick="viewUserProfileByLogin(\'$1\')">@$1</span>');
    }

    function shuffle(a) { for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

        i===-1 ? subscriptions[a].push(b) : subscriptions[a].splice(i,1);
        
        updateUI();
        showSyncIndicator(true);
        
        await saveSubscription(a, subscriptions[a]);
        showMessage(i===-1 ? 'Вы подписались' : 'Вы отписались', 'success');

        if (!p.likes) p.likes = [];

        i===-1 ? p.likes.push(u.id) : p.likes.splice(i,1);
        
        renderFeed();
        showSyncIndicator(true);
        
        await savePost(p);

        const u = getCurrentUser(); if(!u) return showMessage('Войдите','error');
        const inp = document.getElementById(`cmt_${pid}`); const txt = inp.value.trim(); if(!txt) return;
        const p = posts.find(x=>x.id===pid); if(!p) return;
        if (!p.comments) p.comments = [];
        const comment = {authorId:u.id, author:u.name, verified:u.verified||false, text:txt, timestamp:Date.now()};
        p.comments.push(comment);
        
        inp.value = '';
        renderFeed();
        showSyncIndicator(true);
        
        await savePost(p);
    };
    
    window.deleteComment = async (pid, idx) => {
        const u = getCurrentUser(); const p = posts.find(x=>x.id===pid);
        if (p && p.comments[idx] && u && (u.id===p.comments[idx].authorId||u.isAdmin)) {
            p.comments.splice(idx,1);
            renderFeed();
            showSyncIndicator(true);
            
            await savePost(p);
        }
    };
    
    window.giveVerification = async (id) => { 
        if(!isAdmin()) return; 
        const u=getUserById(id); 
        if(u){ 
            u.verified=true; 
            await saveUser(u); 
            await updatePostsVerification(id, true);
            updateUI();
        } 
    };
    
    window.removeVerification = async (id) => { 
        if(!isAdmin()) return; 
        const u=getUserById(id); 
        if(u){ 
            u.verified=false; 
            await saveUser(u); 
            await updatePostsVerification(id, false);
            updateUI();
        } 
    };
    
    window.makeAdmin = async (id) => { if(!isSuperAdmin()) return; const u=getUserById(id); if(u){ u.isAdmin=true; await saveUser(u); updateUI(); } };
    window.removeAdmin = async (id) => { if(!isSuperAdmin()) return; const u=getUserById(id); if(u&&u.id!==ADMIN_ID){ u.isAdmin=false; await saveUser(u); updateUI(); } };
    window.banUser = async (id) => { if(!isAdmin()) return; const r = document.getElementById(`reason_${id}`)?.value||'Нарушение'; const u=getUserById(id); if(u&&!u.isAdmin){ u.banned=true; u.banReason=r; await saveUser(u); updateUI(); } };
    window.unbanUser = async (id) => { if(!isAdmin()) return; const u=getUserById(id); if(u){ u.banned=false; await saveUser(u); updateUI(); } };

    function showRegisterModal() {
        const modal = document.createElement('div'); modal.className = 'modal';
        modal.innerHTML = `<div class="modal-content"><h3>Регистрация</h3><input id="regLogin" placeholder="Логин" maxlength="20"><input id="regPass" type="password" placeholder="Пароль"><input id="regName" placeholder="Имя" maxlength="50"><div class="checkbox-container"><input type="checkbox" id="regAgree"> <label>Согласен с правилами</label></div><button id="regSubmit" class="auth-btn">Зарегистрироваться</button><button id="regCancel" class="auth-btn" style="background:#8b9dc3">Отмена</button></div>`;
        document.body.appendChild(modal);
        document.getElementById('regSubmit').onclick = async () => {
            const login = document.getElementById('regLogin').value.trim();
            const pass = document.getElementById('regPass').value;
            const name = document.getElementById('regName').value.trim();
            if (!document.getElementById('regAgree').checked) return showMessage('Согласитесь с правилами','error');
            if (users.find(u=>u.login===login)) return showMessage('Логин занят','error');
            if (pass.length < 6) return showMessage('Пароль должен быть не менее 6 символов','error');
            const hashedPass = await hashPassword(pass);
            const newUser = { id: 'u_'+Date.now(), login, password: hashedPass, name, isAdmin: false, verified: false, avatar: '', banned: false };
            await saveUser(newUser); await loadAllData();
            modal.remove(); showMessage('Регистрация успешна','success');
        };
        document.getElementById('regCancel').onclick = ()=>modal.remove();
        modal.onclick = e=>{ if(e.target===modal) modal.remove(); };
    }

    function showAccountModal() {
        const u = getCurrentUser(); if(!u) return;
        const modal = document.createElement('div'); modal.className = 'modal';
        modal.innerHTML = `<div class="modal-content"><h3>Управление аккаунтом</h3>
            <div class="account-section"><h4>Изменить имя</h4><input id="newName" value="${escapeHtml(u.name)}"><button id="saveName" class="auth-btn">Сохранить</button></div>
            <div class="account-section"><h4>Изменить логин</h4><input id="newLogin" value="${escapeHtml(u.login)}"><button id="saveLogin" class="auth-btn">Сохранить</button></div>
            <div class="account-section"><h4>Изменить пароль</h4><input id="newPass" type="password" placeholder="Новый пароль"><input id="confirmPass" type="password" placeholder="Подтверждение"><button id="savePass" class="auth-btn">Сохранить</button></div>
            <button id="deleteAccount" class="delete-account-btn">Удалить аккаунт</button>
            <button id="closeModal" class="auth-btn" style="background:#8b9dc3;width:100%;margin-top:10px">Закрыть</button></div>`;
        document.body.appendChild(modal);
        document.getElementById('saveName').onclick = async ()=>{ 
            u.name=document.getElementById('newName').value.trim(); 
            await saveUser(u);
            modal.remove(); 
            updateUI();
            showMessage('Имя изменено','success');
        };
        document.getElementById('saveLogin').onclick = async ()=>{ 
            const nl=document.getElementById('newLogin').value.trim(); 
            if(!users.find(x=>x.login===nl&&x.id!==u.id)){ 
                u.login=nl; await saveUser(u);
                modal.remove(); 
                updateUI();
                showMessage('Логин изменён','success');
            } else showMessage('Логин занят','error'); 
        };
        document.getElementById('savePass').onclick = async ()=>{ 
            const p1=document.getElementById('newPass').value, p2=document.getElementById('confirmPass').value; 
            if(p1 && p1===p2){ 
                if (p1.length < 6) return showMessage('Пароль должен быть не менее 6 символов','error');
                u.password = await hashPassword(p1); 
                await saveUser(u); 
                modal.remove(); 
                showMessage('Пароль изменён','success');
            } else showMessage('Пароли не совпадают','error'); 
        };
        document.getElementById('deleteAccount').onclick = async ()=>{ 
            if(confirm('Удалить аккаунт?')){ 
                await supabase.from('users').delete().eq('id',u.id); 
                currentUserId=null; localStorage.removeItem('rb_session'); 
                location.reload();
            } 
        };
        document.getElementById('closeModal').onclick = ()=>modal.remove();
    }

    function showAvatarUpload() {
        const u = getCurrentUser(); if(!u) return;
        const modal = document.createElement('div'); modal.className = 'modal';
        modal.innerHTML = `<div class="modal-content"><h3>Сменить аватар</h3><div id="avPrev" style="width:100px;height:100px;border-radius:50%;background-size:cover;margin:10px auto;background-image:${getAvatarUrl(u.id)}"></div><input type="file" id="avFile" accept="image/*"><button id="uploadAv" class="auth-btn">Загрузить</button><button id="cancelAv" class="auth-btn" style="background:#8b9dc3">Отмена</button></div>`;
        document.body.appendChild(modal);
        document.getElementById('avFile').onchange = e=>{ const f=e.target.files[0]; if(f&&f.size<=5*1024*1024){ const r=new FileReader(); r.onload=ev=>document.getElementById('avPrev').style.backgroundImage=`url('${ev.target.result}')`; r.readAsDataURL(f); } };
        document.getElementById('uploadAv').onclick = ()=>{ 
            const bg=document.getElementById('avPrev').style.backgroundImage; 
            u.avatar=bg.slice(5,-2); 
            saveUser(u);
            modal.remove(); 
            updateUI();
            showMessage('Аватар обновлён','success');
        };
        document.getElementById('cancelAv').onclick = ()=>modal.remove();
    }

    function showSubsModal() {
        const v = viewingUserId ? getUserById(viewingUserId) : getCurrentUser(); if(!v) return;
        const ids = subscriptions[v.id]||[];
        const subsUsers = ids.map(id=>getUserById(id)).filter(Boolean);
        const modal = document.createElement('div'); modal.className = 'modal';
        modal.innerHTML = `<div class="modal-content"><h3>Подписки ${escapeHtml(v.name)}</h3><div id="list"></div><button id="close" class="auth-btn">Закрыть</button></div>`;
        document.body.appendChild(modal);
        const list = document.getElementById('list');
        if (!subsUsers.length) list.innerHTML='<p>Нет подписок</p>';
        else subsUsers.forEach(u=>{ const d=document.createElement('div'); d.className='subs-item'; d.innerHTML=`<strong>${escapeHtml(u.name)}</strong>`; d.onclick=()=>{ viewingUserId=u.id; modal.remove(); window.location.hash=`/users/${u.login}`; render(); }; list.appendChild(d); });
        document.getElementById('close').onclick = ()=>modal.remove();
    }

    function showFollowersModal() {
        const v = viewingUserId ? getUserById(viewingUserId) : getCurrentUser(); if(!v) return;
        const followers = users.filter(u=>(subscriptions[u.id]||[]).includes(v.id));
        const modal = document.createElement('div'); modal.className = 'modal';
        modal.innerHTML = `<div class="modal-content"><h3>Подписчики ${escapeHtml(v.name)}</h3><div id="list"></div><button id="close" class="auth-btn">Закрыть</button></div>`;
        document.body.appendChild(modal);
        const list = document.getElementById('list');
        if (!followers.length) list.innerHTML='<p>Нет подписчиков</p>';
        else followers.forEach(u=>{ const d=document.createElement('div'); d.className='followers-item'; d.innerHTML=`<strong>${escapeHtml(u.name)}</strong>`; d.onclick=()=>{ viewingUserId=u.id; modal.remove(); window.location.hash=`/users/${u.login}`; render(); }; list.appendChild(d); });
        document.getElementById('close').onclick = ()=>modal.remove();
    }

    async function publishPost() {
        const u = getCurrentUser(); 
        if(!u) return showMessage('Войдите','error');
        
        const text = document.getElementById('postText').value.trim();
        if (!text && !selectedPhoto && !selectedAudio) return showMessage('Пусто','error');
        
        const publishBtn = document.getElementById('publishBtn');
        publishBtn.disabled = true;
        publishBtn.innerText = 'Публикация...';
        
        let photo='', audio='';
        
        try {
            if (selectedPhoto) {
                photo = await new Promise((resolve, reject) => {
                    const fr = new FileReader();
                    fr.onload = e => resolve(e.target.result);
                    fr.onerror = () => reject('Ошибка чтения фото');
                    fr.readAsDataURL(selectedPhoto);
                });
            }
            
            if (selectedAudio) {
                audio = await new Promise((resolve, reject) => {
                    const fr = new FileReader();
                    fr.onload = e => resolve(e.target.result);
                    fr.onerror = () => reject('Ошибка чтения аудио');
                    fr.readAsDataURL(selectedAudio);
                });
            }
            
            const post = { 
                id: 'p_'+Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                authorId: u.id, 
                authorName: u.name, 
                verified: u.verified||false, 
                timestamp: Date.now(), 
                text, 
                photo, 
                audio, 
                likes:[], 
                comments:[] 
            };
            
            posts.unshift(post);
            
            document.getElementById('postText').value = '';
            selectedPhoto = null;
            selectedAudio = null;
            document.getElementById('postImage').value = '';
            document.getElementById('postAudio').value = '';
            updatePreviews();
            
            renderFeed();
            showSyncIndicator(true);
            
            const { error } = await supabase.from('posts').insert(post);
            if (error) throw error;
            
            showMessage('Опубликовано!', 'success');
            
        } catch (error) {
            console.error('Publish error:', error);
            showMessage('Ошибка публикации', 'error');
            await loadAllData();
            renderFeed();
        } finally {
            publishBtn.disabled = false;
            publishBtn.innerText = 'Опубликовать';
        }
    }

    function updatePreviews() {
        document.getElementById('photoPreview').innerHTML = selectedPhoto ? `${selectedPhoto.name} <button class="remove-file-btn" onclick="clearPhoto()">X</button>` : '';
        document.getElementById('audioPreview').innerHTML = selectedAudio ? `${selectedAudio.name} <button class="remove-file-btn" onclick="clearAudio()">X</button>` : '';
    }
    
    window.clearPhoto = ()=>{ selectedPhoto=null; document.getElementById('postImage').value=''; updatePreviews(); };
    window.clearAudio = ()=>{ selectedAudio=null; document.getElementById('postAudio').value=''; updatePreviews(); };

    window.onhashchange = async () => {
        const h = window.location.hash.substring(1);
        
        if (!dataLoaded) {
            document.getElementById('feedContainer').innerHTML = '<div class="loading">Загрузка...</div>';
            await loadAllData();
        }
        
        if (h==='about') {
            currentTab='about';
            viewingUserId = null;
        }
        else if (h==='rules') {
            currentTab='rules';
            viewingUserId = null;
        }
        else if (h==='recommendations') {
            currentTab='recommendations';
            viewingUserId = null;
        }
        else if (h.startsWith('users/')) {
            currentTab='feed';
            const login = h.split('/')[1];
            const user = users.find(x=>x.login===login);
            if (user) {
                viewingUserId = user.id;
            } else {
                viewingUserId = null;
                showMessage('Пользователь не найден', 'error');
            }
        }
        else {
            currentTab='feed';
            viewingUserId = null;
        }
        
        render();
    };

    document.addEventListener('DOMContentLoaded', async ()=>{
        document.getElementById('feedContainer').innerHTML = '<div class="loading">Загрузка данных...</div>';
        
        await loadAllData();
        
        document.getElementById('publishBtn').onclick = publishPost;
        document.getElementById('postImage').onchange = e=>{ const f=e.target.files[0]; if(f&&f.size<=5*1024*1024) selectedPhoto=f; updatePreviews(); };
        document.getElementById('postAudio').onchange = e=>{ const f=e.target.files[0]; if(f&&f.size<=10*1024*1024) selectedAudio=f; updatePreviews(); };
        
        document.querySelectorAll('.tab-btn').forEach(b=>b.onclick=()=>{ 
            currentTab=b.dataset.tab; 
            window.location.hash = currentTab==='feed' ? '' : currentTab;
            if (currentTab === 'feed') currentFeedMode = 'recent';
            render();
        });
        
        document.querySelectorAll('.mobile-tab-btn').forEach(b=>b.onclick=()=>{ 
            currentTab=b.dataset.tab; 
            window.location.hash = currentTab==='feed' ? '' : currentTab;
            document.getElementById('mobileSidebar').classList.remove('open'); 
            document.getElementById('mobileOverlay').classList.remove('open'); 
            if (currentTab === 'feed') currentFeedMode = 'recent';
            render();
        });
        
        document.querySelectorAll('.feed-tab-btn').forEach(b=>b.onclick=()=>{ 
            if (b.dataset.feed !== 'recommendations') {
                currentFeedMode=b.dataset.feed; 
                document.querySelectorAll('.feed-tab-btn').forEach(x=>x.classList.remove('active')); 
                b.classList.add('active'); 
                renderFeed(); 
            }
        });
        
        document.getElementById('burgerBtn').onclick = ()=>{ document.getElementById('mobileSidebar').classList.add('open'); document.getElementById('mobileOverlay').classList.add('open'); };
        document.getElementById('closeMobile').onclick = ()=>{ document.getElementById('mobileSidebar').classList.remove('open'); document.getElementById('mobileOverlay').classList.remove('open'); };
        document.getElementById('mobileOverlay').onclick = ()=>{ document.getElementById('mobileSidebar').classList.remove('open'); document.getElementById('mobileOverlay').classList.remove('open'); };
        document.getElementById('closeAdmin').onclick = ()=>document.getElementById('adminPanel').classList.remove('open');
        document.getElementById('giveBadge').onclick = ()=>{ const s=document.getElementById('userSelect'); if(s.value) giveVerification(s.value); };
        document.getElementById('removeBadge').onclick = ()=>{ const s=document.getElementById('userSelect'); if(s.value) removeVerification(s.value); };
        document.getElementById('makeAdminBtn').onclick = ()=>{ const s=document.getElementById('userSelect'); if(s.value) makeAdmin(s.value); };
        document.getElementById('removeAdminBtn').onclick = ()=>{ const s=document.getElementById('userSelect'); if(s.value) removeAdmin(s.value); };
        document.getElementById('postText').oninput = function(){ document.getElementById('charCounter').innerText = this.value.length+' / 1500'; };
        
        if (window.location.hash) {
            window.onhashchange();
        } else {
            render();
        }
    });
</script>
