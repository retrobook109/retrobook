            return escapeHtml(url);
        });
    }
    
    function processPostText(text) {
        if (!text) return '';
        
        let processed = escapeHtml(text);
        processed = processed.replace(/\n/g, '<br>');
        processed = applyFormatting(processed);
        processed = linkify(processed);
        
        const tempMap = new Map();
        let counter = 0;
        processed = processed.replace(/<[^>]+>/g, (match) => {
            const key = '__TEMP_' + (counter++) + '__';
            tempMap.set(key, match);
            return key;
        });
        
        const mentionRegex = /@([a-zA-Z0-9\u0430-\u044F\u0410-\u042F\u0451\u0401_-]+)/g;
        processed = processed.replace(mentionRegex, (match, username) => {
            const user = users.find(u => u.login && u.login.toLowerCase() === username.toLowerCase());
            if (user && !user.banned) {
                return '<span class="mention" onclick="window.viewUserProfile(\'' + escapeAttr(user.id) + '\')">@' + escapeHtml(username) + '</span>';
            }
            return '@' + escapeHtml(username);
        });
        
        tempMap.forEach((value, key) => {
            processed = processed.replace(key, value);
        });
        
        return processed;
    }
    
    function formatTime(timestamp) { 
        const diff = Math.floor((Date.now() - timestamp) / 1000); 
        if (diff < 60) return "только что"; 
        if (diff < 3600) return Math.floor(diff / 60) + " мин назад"; 
        if (diff < 86400) return Math.floor(diff / 3600) + " ч назад"; 
        return Math.floor(diff / 86400) + " дн назад"; 
    }

    async function createSession(userId) {
        try {
            const token = generateSessionToken();
            const hashedToken = await hashSessionToken(token);
            
            await supabase.from('user_sessions').insert({
                user_id: userId,
                token_hash: hashedToken,
                is_active: true,
                created_at: new Date().toISOString(),
                last_activity: new Date().toISOString()
            });
            
            return token;
        } catch (error) {
            console.error('Session create error:', error);
            return null;
        }
    }
    
    async function validateSession(userId, token) {
        if (!userId || !token) return false;
        
        try {
            const hashedToken = await hashSessionToken(token);
            
            const { data: session } = await supabase
                .from('user_sessions')
                .select('*')
                .eq('user_id', userId)
                .eq('token_hash', hashedToken)
                .eq('is_active', true)
                .single();
            
            if (!session) return false;
            
            const lastActivity = new Date(session.last_activity);
            const now = new Date();
            const sevenDays = 7 * 24 * 60 * 60 * 1000;
            
            if (now - lastActivity > sevenDays) {
                await supabase.from('user_sessions').update({ is_active: false }).eq('id', session.id);
                return false;
            }
            
            await supabase.from('user_sessions')
                .update({ last_activity: now.toISOString() })
                .eq('id', session.id);
            
            return true;
        } catch (error) {
            console.error('Session validate error:', error);
            return false;
        }
    }
    
    async function endSession(userId, token) {
        if (!userId || !token) return;
        
        try {
            const hashedToken = await hashSessionToken(token);
            await supabase.from('user_sessions')
                .update({ is_active: false })
                .eq('user_id', userId)
                .eq('token_hash', hashedToken);
        } catch (error) {
            console.error('Session end error:', error);
        }
    }

        } catch (error) {
            console.error('End all sessions error:', error);
        }
    }

    async function login(login, pass) { 
        login = login.trim(); 
        
        try {
            const { data } = await supabase.from('users').select('*');
            if (data) users = data;
            
            const u = users.find(x => x.login === login); 
            if (!u) { 
                showMessage("Неверный логин или пароль", 'error'); 
                return; 
            }
            
            let valid = false;
            if (u.password && u.password.length === 64 && /^[a-f0-9]+$/i.test(u.password)) {
                valid = await verifyPassword(pass, u.password);
            } else {
                valid = (u.password === pass);
            }
            
            if (!valid) { 
                showMessage("Неверный логин или пароль", 'error'); 
                return; 
            } 
            
            if (u.banned) { 
                showMessage("Аккаунт заблокирован!", 'error'); 
                return; 
            } 
            
            const sessionToken = await createSession(u.id);
            if (!sessionToken) {
                showMessage("Ошибка создания сессии", 'error');
                return;
            }
            
            currentUserId = u.id;
            currentSessionToken = sessionToken;
            viewingUserId = null; 
            window.location.hash = ''; 
            
            const sessionData = {
                userId: u.id,
                token: sessionToken
            };
            localStorage.setItem('rb_session', JSON.stringify(sessionData));
            
            render(); 
            showMessage("Добро пожаловать, " + u.name, 'success');
        } catch (error) {
            console.error('Login error:', error);
            showMessage("Ошибка при входе", 'error');
        }
    }
    
    async function logout() {
        if (currentUserId && currentSessionToken) {
            await endSession(currentUserId, currentSessionToken);
        }
        
        currentUserId = null;
        currentSessionToken = null;
        viewingUserId = null; 
        window.location.hash = ''; 
        localStorage.removeItem('rb_session');
        
        render(); 
        showMessage("Вы вышли из аккаунта", 'info');
    }

    async function register(login, pass, name, agreeToRules) { 
        if (!agreeToRules) { 
            showMessage("Вы должны согласиться с правилами", 'error'); 
            return false; 
        }
        
        if (users.find(x => x.login.toLowerCase() === login.toLowerCase())) { 
            showMessage("Логин занят", 'error'); 
            return false; 
        } 
        if (login.length < 3 || pass.length < 6 || name.length < 2) { 
            showMessage("Минимум 3 символа для логина, 6 для пароля и 2 для имени", 'error'); 
            return false; 
        }
        
        if (!/^[a-zA-Z0-9_-]+$/.test(login)) {
            showMessage("Логин может содержать только буквы, цифры, _ и -", 'error');
            return false;
        }
        
        try {
            const newId = "user_" + Date.now() + "_" + Math.random().toString(36).substr(2, 9);
            const h = await hashPassword(pass); 
            const newUser = { 
                id: newId, 
                login: login, 
                password: h, 
                name: name.substring(0, 50).replace(/[<>]/g, ''), 
                isAdmin: false, 
                verified: false, 
                avatar: "", 
                banned: false 
            };
            
            await supabase.from('users').upsert(newUser);
            users.push(newUser);
            
            showMessage("Регистрация успешна! Войдите.", 'success'); 
            return true;
        } catch (error) {
            console.error('Register error:', error);
            showMessage("Ошибка при регистрации", 'error');
            return false;
        }
    }

    function getFilteredPosts() { 
        let filtered = posts.filter(p => !p.deleted);
        filtered = filtered.filter(p => {
            const author = getUserById(p.authorId);
            return author && !author.banned;
        });
        
        if (viewingUserId) filtered = filtered.filter(p => p.authorId === viewingUserId); 
        if (currentFeedMode === 'recent') filtered.sort((a, b) => b.timestamp - a.timestamp); 
        else filtered = filtered.sort(() => Math.random() - 0.5); 
        return filtered; 
    }

    function renderFeed() { 
        const c = document.getElementById('feedContainer');
        const cu = getCurrentUser(); 
        const filtered = getFilteredPosts(); 
        
        if (!filtered.length) { 
            c.innerHTML = '<div style="background:white;padding:20px;text-align:center;">Нет постов</div>'; 
            return; 
        }
        
        let html = ''; 
        const postsToShow = filtered.slice(0, displayedPostsCount);
        
        for (const p of postsToShow) {
            const author = getUserById(p.authorId);
            if (!author) continue;
            
            const canDel = cu && (cu.id === p.authorId || cu.isAdmin); 
            const isLiked = cu && p.likes && p.likes.includes(cu.id); 
            const vBadge = author.verified ? ' <span class="verified-icon">✔</span>' : ''; 
            const isSubscribed = cu && isFollowing(cu.id, p.authorId) && cu.id !== p.authorId;
            const commentsCount = p.comments ? p.comments.length : 0;
            
            const processedText = processPostText(p.text || '');
            
            html += '<div class="post" id="post_' + escapeAttr(p.id) + '">' +
                '<div class="post-header" onclick="window.viewUserProfile(\'' + escapeAttr(p.authorId) + '\')">' +
                '<div class="post-avatar" style="background-image:' + getAvatarUrl(p.authorId) + '"></div>' +
                '<div><span class="post-author">' + escapeHtml(p.authorName || author.name) + vBadge + '</span>' +
                '<span class="post-time">' + formatTime(p.timestamp) + '</span>';
            
            if (cu && cu.id !== p.authorId) {
                html += '<button class="comment-action" style="margin-left:8px;background:' + (isSubscribed ? '#8b9dc3' : '#4267b2') + ';color:white;border:none;padding:3px 8px;border-radius:3px;cursor:pointer;font-size:10px;" onclick="event.stopPropagation(); window.toggleFollow(\'' + cu.id + '\',\'' + p.authorId + '\')">' + (isSubscribed ? 'Отписаться' : 'Подписаться') + '</button>';
            }
            
            html += '</div></div><div class="post-content">' + processedText + '</div>';
            
            if (p.photo) html += '<img class="post-photo" src="' + escapeAttr(p.photo) + '" loading="lazy" alt="Post image">';
            if (p.audio) html += '<div class="post-audio"><audio controls src="' + escapeAttr(p.audio) + '" preload="none"></audio></div>';
            
            html += '<div class="post-stats">' +
                '<button class="like-btn ' + (isLiked ? 'liked' : '') + '" onclick="window.toggleLike(\'' + escapeAttr(p.id) + '\')">Нравится (' + (p.likes ? p.likes.length : 0) + ')</button>' +
                (canDel ? '<button class="delete-btn" onclick="window.deletePost(\'' + escapeAttr(p.id) + '\')">Удалить пост</button>' : '') +
                '</div>' +
                '<button class="show-comments-btn" onclick="window.toggleComments(\'' + escapeAttr(p.id) + '\')">Комментарии (' + commentsCount + ')</button>' +
                '<div class="comments-section" id="comments_' + escapeAttr(p.id) + '" style="display:none;"></div></div>';
        }
        
        if (displayedPostsCount < filtered.length) {
            html += '<button class="load-more-btn" onclick="window.loadMorePosts()">Загрузить ещё (' + (filtered.length - displayedPostsCount) + ')</button>';
        }
        
        c.innerHTML = html; 
    }

        const isOwnProfile = !viewingUserId || viewingUserId === currentUserId;

        const avatar = document.getElementById('mobileAvatar');
        const name = document.getElementById('mobileName');
        const verifiedBadge = document.getElementById('mobileVerifiedBadge');
        
        if (avatar) avatar.style.backgroundImage = getAvatarUrl(displayUser ? displayUser.id : null);

        if (verifiedBadge) verifiedBadge.innerHTML = (displayUser && displayUser.verified) ? '<span class="verified-icon">✔</span>' : '';

        const followCont = document.getElementById('mobileFollowBtnContainer');
        if (followCont) {
            if (isViewingOther && u) {
                const isSub = isFollowing(currentUserId, viewingUserId);
                followCont.innerHTML = '<button class="follow-btn-on-page" style="width:100%;background:' + (isSub ? '#8b9dc3' : '#4267b2') + ';" onclick="window.toggleFollow(\'' + currentUserId + '\',\'' + viewingUserId + '\')">' + (isSub ? 'Отписаться' : 'Подписаться') + '</button>';
                followCont.style.display = 'block';
            } else {
                followCont.style.display = 'none';
            }
        }

        const subsBtn = document.getElementById('mobileSubsBtn');
        const followersBtn = document.getElementById('mobileFollowersBtn');
        if (displayUser) {
            if (subsBtn) { subsBtn.style.display = 'block'; subsBtn.textContent = 'ПОДПИСКИ (' + getFollowedCount(displayUser.id) + ')'; subsBtn.onclick = showSubsModal; }
            if (followersBtn) { followersBtn.style.display = 'block'; followersBtn.textContent = 'ПОДПИСЧИКИ (' + getFollowers(displayUser.id).length + ')'; followersBtn.onclick = showFollowersModal; }
        } else {
            if (subsBtn) subsBtn.style.display = 'none';
            if (followersBtn) followersBtn.style.display = 'none';
        }

        const accountBtn = document.getElementById('mobileAccountBtn');
        if (accountBtn) {
            if (u && isOwnProfile) { accountBtn.style.display = 'block'; accountBtn.onclick = showAccountModal; }
            else accountBtn.style.display = 'none';
        }

        const backBtn = document.getElementById('mobileBackBtn');
        if (backBtn) {
            if (isViewingOther && u) { backBtn.style.display = 'block'; backBtn.onclick = window.goToMain; }
            else backBtn.style.display = 'none';
        }
        
        if (avatar) avatar.onclick = () => { if (u && isOwnProfile) showAvatarUpload(); };
    }

    async function publishPost() { 
        const u = getCurrentUser(); 
        if (!u) { showMessage("Войдите в аккаунт", 'error'); return; } 
        
        const txt = document.getElementById('postText').value; 
        if (!txt.trim() && !selectedPhoto && !selectedAudio) { 
            showMessage("Напишите текст или добавьте файл", 'error'); 
            return; 
        } 
        
        let img64 = "";
        let aud64 = "";
        
        if (selectedPhoto) {
            if (selectedPhoto.size > 5 * 1024 * 1024) {
                showMessage("Фото слишком большое (макс. 5 МБ)", 'error');
                return;
            }
            img64 = await new Promise(r => { 
                const fr = new FileReader(); 
                fr.onload = e => r(e.target.result); 
                fr.readAsDataURL(selectedPhoto); 
            });
        }
        
        if (selectedAudio) {
            if (selectedAudio.size > 10 * 1024 * 1024) {
                showMessage("Аудио слишком большое (макс. 10 МБ)", 'error');
                return;
            }
            aud64 = await new Promise(r => { 
                const fr = new FileReader(); 
                fr.onload = e => r(e.target.result); 
                fr.readAsDataURL(selectedAudio); 
            });
        }
        
        const newPost = { 
            id: Date.now().toString(), 
            authorId: u.id, 
            authorName: u.name, 
            timestamp: Date.now(), 
            text: txt.trim() || "Новый пост", 
            photo: img64, 
            audio: aud64, 
            likes: [], 
            comments: [], 
            deleted: false 
        }; 
        
        await supabase.from('posts').upsert(newPost);
        posts.unshift(newPost);
        
        document.getElementById('postText').value = ''; 
        selectedPhoto = null;
        selectedAudio = null;
        document.getElementById('postImage').value = '';
        document.getElementById('postAudio').value = '';
        document.getElementById('photoPreview').textContent = '';
        document.getElementById('audioPreview').textContent = '';
        document.getElementById('charCounter').textContent = '0 / 1500';
        
        displayedPostsCount = POSTS_PER_PAGE;
        renderFeed(); 
        showMessage("Опубликовано!", 'success');
    }

    function parseHash() {
        const h = window.location.hash.substring(1);
        if (h === 'about') { currentTab = 'about'; viewingUserId = null; }
        else if (h === 'rules') { currentTab = 'rules'; viewingUserId = null; }
        else if (h.startsWith('users/')) { 
            currentTab = 'feed'; 
            const login = decodeURIComponent(h.split('/')[1]);
            const user = getUserByLogin(login);
            viewingUserId = user ? user.id : null;
        }
        else { currentTab = 'feed'; viewingUserId = null; }
        render();
    }

    function render() { 
        try {
            renderAuth(); 
            renderSidebar(); 
            renderMobile(); 
            renderPostArea(); 
            
            const feedContainer = document.getElementById('feedContainer');
            const aboutContainer = document.getElementById('aboutContainer');
            const rulesContainer = document.getElementById('rulesContainer');
            
            if (feedContainer) feedContainer.style.display = currentTab === 'feed' ? 'block' : 'none';
            if (aboutContainer) aboutContainer.style.display = currentTab === 'about' ? 'block' : 'none';
            if (rulesContainer) rulesContainer.style.display = currentTab === 'rules' ? 'block' : 'none';
            
            if (currentTab === 'feed') renderFeed(); 
            else if (currentTab === 'about') renderAbout();
            else if (currentTab === 'rules') renderRules();
            
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            const activeTab = document.querySelector('.tab-btn[data-tab="' + currentTab + '"]');
            if (activeTab) activeTab.classList.add('active');
            
            const loading = document.getElementById('globalLoading');
            if (loading) loading.style.display = 'none';
        } catch (error) {
            console.error('Render error:', error);
            const loading = document.getElementById('globalLoading');
            if (loading) loading.style.display = 'none';
            showMessage('Произошла ошибка при загрузке', 'error');
        }
    }

    function formatText(text, format) { 
        const ta = document.getElementById('postText'); 
        const start = ta.selectionStart;
        const end = ta.selectionEnd; 
        const selected = text.substring(start, end); 
        let replacement;
        if (format === 'bold') replacement = '**' + selected + '**';
        else if (format === 'italic') replacement = '*' + selected + '*';
        else if (format === 'underline') replacement = '__' + selected + '__';
        else replacement = '~~' + selected + '~~';
        return text.substring(0, start) + replacement + text.substring(end); 
    }

    function isFollowing(a, b) { return subscriptions[a] && subscriptions[a].includes(b); }
    function getFollowedCount(id) { return subscriptions[id] ? subscriptions[id].length : 0; }
    
    function getFollowers(userId) { 
        const followers = []; 
        for (const [subId, following] of Object.entries(subscriptions)) { 
            if (following.includes(userId)) { 
                const user = getUserById(subId); 
                if (user && !user.banned) followers.push(user); 
            } 
        } 
        return followers; 
    }
    
    window.toggleFollow = async function(a, b) { 
        if (a === b) { showMessage("Нельзя подписаться на себя", 'error'); return; } 
        if (!subscriptions[a]) subscriptions[a] = []; 
        const i = subscriptions[a].indexOf(b); 
        if (i === -1) subscriptions[a].push(b);
        else subscriptions[a].splice(i, 1);
        await supabase.from('subscriptions').upsert({ userId: a, following: subscriptions[a] });
        renderSidebar(); 
        renderMobile(); 
        showMessage(i === -1 ? "Вы подписались" : "Вы отписались", 'success'); 
    };

        modal.innerHTML = '<div class="modal-content"><h3>Подписки ' + escapeHtml(u.name) + ' (' + usersList.length + ')</h3><div id="subsList"></div><button id="closeSubsModal" class="auth-btn">Закрыть</button></div>';

            usersList.forEach(user => {

                div.className = 'subs-item'; 
                div.innerHTML = '<strong>' + escapeHtml(user.name) + '</strong> ' + (user.verified ? '<span class="verified-icon">✔</span>' : '');

    async function loadSettings() {
        try {
            const { data } = await supabase.from('settings').select('*').eq('key', 'main').single();
            if (data) {
                aboutText = data.about_text || aboutText;
                rulesText = data.rules_text || rulesText;
                maintenanceMode = data.maintenance_mode || false;
            }
        } catch (error) {
            console.error('Settings load error:', error);
        }
    }

    async function init() {
        try {
            if (initialized) return;
            initialized = true;
            
            document.getElementById('globalLoading').style.display = 'flex';
            
            await loadSettings();
            
            const [usersRes, postsRes, subsRes] = await Promise.all([
                supabase.from('users').select('*'),
                supabase.from('posts').select('*').order('timestamp', { ascending: false }).limit(100),
                supabase.from('subscriptions').select('*')
            ]);
            
            users = usersRes.data || [];
            posts = (postsRes.data || []).filter(p => !p.deleted);
            
            if (subsRes.data) { 
                subscriptions = {}; 
                subsRes.data.forEach(item => { subscriptions[item.userId] = item.following || []; }); 
            }
            
            if (maintenanceMode) {
                const saved = localStorage.getItem('rb_session');
                let isAdminUser = false;
                
                if (saved) {
                    try {
                        const sessionData = JSON.parse(saved);
                        const u = users.find(user => user.id === sessionData.userId);
                        if (u && u.isAdmin) {
                            const isValid = await validateSession(sessionData.userId, sessionData.token);
                            if (isValid) {
                                isAdminUser = true;
                                currentUserId = sessionData.userId;
                                currentSessionToken = sessionData.token;
                            }
                        }
                    } catch (e) {}
                }
                
                if (!isAdminUser) {
                    showMaintenanceScreen();
                    return;
                }
            }
            
            const existingAdmin = users.find(u => u.id === ADMIN_ID);
            
            if (!existingAdmin) {
                const h = await hashPassword(ADMIN_PASSWORD);
                const admin = { 
                    id: ADMIN_ID, 
                    login: ADMIN_LOGIN, 
                    password: h, 
                    name: "RetroBook", 
                    isAdmin: true, 
                    verified: true, 
                    avatar: "", 
                    banned: false 
                };
                await supabase.from('users').upsert(admin);
                users.push(admin);
            }
            
            if (posts.length === 0) {
                const welcomePost = { 
                    id: 'welcome_' + Date.now(),
                    authorId: ADMIN_ID, 
                    authorName: "RetroBook", 
                    timestamp: Date.now(), 
                    text: "Добро пожаловать в RetroBook! Это социальная сеть в стиле 2011 года. Отмечайте пользователей через @username", 
                    photo: "", 
                    audio: "", 
                    likes: [], 
                    comments: [], 
                    deleted: false 
                };
                await supabase.from('posts').upsert(welcomePost);
                posts.push(welcomePost);
            }
            
            if (!currentUserId) {
                const saved = localStorage.getItem('rb_session');
                if (saved) {
                    try {
                        const sessionData = JSON.parse(saved);
                        const isValid = await validateSession(sessionData.userId, sessionData.token);
                        
                        if (isValid) {
                            const user = users.find(u => u.id === sessionData.userId && !u.banned);
                            if (user) {
                                currentUserId = sessionData.userId;
                                currentSessionToken = sessionData.token;
                            } else {
                                localStorage.removeItem('rb_session');
                            }
                        } else {
                            localStorage.removeItem('rb_session');
                        }
                    } catch (e) {
                        localStorage.removeItem('rb_session');
                    }
                }
            }
            
            window.addEventListener('hashchange', parseHash);
            
            document.querySelectorAll('.format-btn').forEach(btn => btn.addEventListener('click', () => {
                const ta = document.getElementById('postText'); 
                ta.value = formatText(ta.value, btn.dataset.format); 
                ta.focus();
            }));
            
            const postText = document.getElementById('postText');
            if (postText) {
                postText.addEventListener('input', function() {
                    document.getElementById('charCounter').textContent = this.value.length + ' / 1500';
                });
            }
            
            const publishBtn = document.getElementById('publishBtn');
            if (publishBtn) publishBtn.addEventListener('click', publishPost);
            
            document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => {
                currentTab = btn.dataset.tab;
                viewingUserId = null;
                window.location.hash = currentTab === 'feed' ? '' : currentTab;
                render();
            }));
            
            document.querySelectorAll('.feed-tab-btn').forEach(btn => btn.addEventListener('click', () => {
                document.querySelectorAll('.feed-tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active'); 
                currentFeedMode = btn.dataset.feed; 
                displayedPostsCount = POSTS_PER_PAGE; 
                renderFeed();
            }));
            
            const burgerBtn = document.getElementById('burgerBtn');
            if (burgerBtn) {
                burgerBtn.addEventListener('click', () => {
                    document.getElementById('mobileSidebar').classList.add('open'); 
                    document.getElementById('mobileOverlay').classList.add('open');
                });
            }
            
            const closeMobile = document.getElementById('closeMobile');
            if (closeMobile) {
                closeMobile.addEventListener('click', () => {
                    document.getElementById('mobileSidebar').classList.remove('open'); 
                    document.getElementById('mobileOverlay').classList.remove('open');
                });
            }
            
            const mobileOverlay = document.getElementById('mobileOverlay');
            if (mobileOverlay) {
                mobileOverlay.addEventListener('click', () => {
                    document.getElementById('mobileSidebar').classList.remove('open'); 
                    document.getElementById('mobileOverlay').classList.remove('open');
                });
            }
            
            document.querySelectorAll('.mobile-tab-btn').forEach(btn => btn.addEventListener('click', () => {
                currentTab = btn.dataset.tab;
                viewingUserId = null;
                window.location.hash = currentTab === 'feed' ? '' : currentTab;
                document.getElementById('mobileSidebar').classList.remove('open'); 
                document.getElementById('mobileOverlay').classList.remove('open');
                render();
            }));
            
            const postImage = document.getElementById('postImage');
            if (postImage) {
                postImage.addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        if (file.size > 5 * 1024 * 1024) {
                            showMessage("Файл слишком большой (макс. 5 МБ)", 'error');
                            e.target.value = '';
                            return;
                        }
                        selectedPhoto = file;
                        const preview = document.getElementById('photoPreview');
                        preview.textContent = '';
                        const btn = document.createElement('button');
                        btn.className = 'remove-file-btn';
                        btn.textContent = 'Удалить';
                        btn.onclick = window.clearPhoto;
                        preview.appendChild(document.createTextNode('Файл выбран '));
                        preview.appendChild(btn);
                    }
                });
            }
            
            const postAudio = document.getElementById('postAudio');
            if (postAudio) {
                postAudio.addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        if (file.size > 10 * 1024 * 1024) {
                            showMessage("Файл слишком большой (макс. 10 МБ)", 'error');
                            e.target.value = '';
                            return;
                        }
                        selectedAudio = file;
                        const preview = document.getElementById('audioPreview');
                        preview.textContent = '';
                        const btn = document.createElement('button');
                        btn.className = 'remove-file-btn';
                        btn.textContent = 'Удалить';
                        btn.onclick = window.clearAudio;
                        preview.appendChild(document.createTextNode('Файл выбран '));
                        preview.appendChild(btn);
                    }
                });
            }
            
            setTimeout(() => parseHash(), 10);
            
        } catch (error) {
            console.error('Init error:', error);
            const loading = document.getElementById('globalLoading');
            if (loading) loading.style.display = 'none';
            const feedContainer = document.getElementById('feedContainer');
            if (feedContainer) feedContainer.innerHTML = '<div style="background:white;padding:20px;text-align:center;color:#dd3b3b;">Ошибка загрузки. Обновите страницу.</div>';
        }
    }

    init();
</script>
</body>
</html>
