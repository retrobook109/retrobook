    function waitForData() {
        return new Promise(resolve => {
            if (dataReady) resolve();
            else {
                const check = setInterval(() => {
                    if (dataReady) { clearInterval(check); resolve(); }
                }, 50);
            }
        });
    }

    function escapeAttr(s) {
        if (s == null) return '';
        return String(s).replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }

    function showMessage(msg, type='info') { 
        let t = document.createElement('div'); 
        t.className = 'toast'; 
        t.innerText = msg; 
        t.style.background = type==='error'?'#dd3b3b':type==='success'?'#4caf50':'#333'; 
        document.body.appendChild(t); 
        setTimeout(()=>t.remove(),3000); 
    }
    
    function escapeHtml(s) { 
        if(!s) return ''; 
        return s.replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); 
    }
    
    function linkify(text) { 
        return text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>'); 
    }
    
    function applyFormatting(text) { 
        text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>'); 
        text = text.replace(/\*(.*?)\*/g, '<em>$1</em>'); 
        text = text.replace(/__(.*?)__/g, '<u>$1</u>'); 
        text = text.replace(/~~(.*?)~~/g, '<s>$1</s>'); 
        return text; 
    }
    
    function formatTime(timestamp) { 
        let diff = Math.floor((Date.now() - timestamp) / 1000); 
        if (diff < 60) return "только что"; 
        if (diff < 3600) return Math.floor(diff/60) + " мин назад"; 
        if (diff < 86400) return Math.floor(diff/3600) + " ч назад"; 
        return Math.floor(diff/86400) + " дн назад"; 
    }
    
    function getCurrentUser() { return users.find(u=>u.id===currentUserId); }
    function getUserById(id) { return users.find(u=>u.id===id); }
    
    function getUserByIdentifier(identifier) {
        if (!identifier) return null;
        const decoded = decodeURIComponent(identifier).toLowerCase().trim();
        return users.find(u => 
            u.id === decoded ||
            (u.login && u.login.toLowerCase() === decoded) ||
            (u.name && u.name.toLowerCase() === decoded)
        );
    }
    
    function getUserByLogin(login) {
        if (!login) return null;
        const lowerLogin = decodeURIComponent(login).toLowerCase().trim();
        return users.find(u => u.login && u.login.toLowerCase() === lowerLogin);
    }

    window.toggleLike = async function(id) { 
        let u = getCurrentUser(); 
        if(!u) { showMessage("Войдите в аккаунт"); return; } 
        let p = posts.find(x => x.id == id); 
        if(p){ 
            if(!p.likes) p.likes = [];
            let i = p.likes.indexOf(u.id); 
            if(i === -1) {
                p.likes.push(u.id);
            } else {
                p.likes.splice(i, 1);
            }
            const { data, error } = await supabase.from('posts').upsert(p).select().single();
            if (!error && data) {
                const idx = posts.findIndex(x => x.id == id);
                if (idx !== -1) posts[idx] = data;
            }
            renderFeed(); 
            if (currentTab === 'recommendations') renderRecommendations();
        }

    window.deletePost = async function(id) { 
        let u = getCurrentUser(), p = posts.find(x => x.id == id); 
        if(p && u && (u.id === p.authorId || u.isAdmin)) { 
            p.deleted = true;
            await supabase.from('posts').upsert(p);
            posts = posts.filter(x => x.id != id); 
            renderFeed(); 
            showMessage("Пост удалён"); 
        } else showMessage("Нет прав для удаления");

    window.addComment = async function(id) { 
        let inp = document.getElementById('cmt_' + id); 
        if(!inp || !inp.value.trim()) return; 
        let u = getCurrentUser(); 
        if(!u) { showMessage("Войдите в аккаунт"); return; } 
        let p = posts.find(x => x.id == id); 
        if(p){ 
            if(!p.comments) p.comments = [];
            p.comments.push({ 
                authorId: u.id, 
                author: u.name, 
                verified: u.verified, 
                text: inp.value.trim().substring(0, 500),

            });

    window.deleteComment = function(postId, commentIdx) { 
        let u = getCurrentUser(); 
        if(!u) { showMessage("Войдите в аккаунт"); return; }
        let p = posts.find(x => x.id == postId); 
        if(p && p.comments && p.comments[commentIdx]) {
            const comment = p.comments[commentIdx];
            if (u.id === comment.authorId || u.isAdmin) {
                p.comments.splice(commentIdx, 1);
                supabase.from('posts').upsert(p).then(({ data }) => {
                    if (data) {
                        const idx = posts.findIndex(x => x.id == postId);
                        if (idx !== -1) posts[idx] = data;
                    }
                    renderFeed();
                    showMessage("Комментарий удалён");
                });
            } else {
                showMessage("Нет прав для удаления");
            }
        }

    async function login(login, pass) { 
        login = login.trim(); 
        const attempt = checkLoginAttempts(login);
        if (!attempt.allowed) {
            showMessage(`Слишком много попыток. Подождите ${attempt.timeLeft} мин.`, 'error');
            return;
        }
        
        const { data, error } = await supabase.from('users').select('*');
        if (error) { console.error(error); showMessage('Ошибка соединения', 'error'); return; }
        if (data) users = data;
        
        let u = users.find(x => x.login === login); 
        if(!u) { recordFailedAttempt(login); showMessage("Неверный логин или пароль"); return; }
        
        let valid = false;
        if (u.password && u.password.length === 64 && /^[a-f0-9]+$/i.test(u.password)) {
            valid = await verifyPassword(pass, u.password);
        } else {
            valid = (u.password === pass);
        }
        
        if(!valid) { recordFailedAttempt(login); showMessage("Неверный логин или пароль"); return; } 
        if(u.banned) { alert("Аккаунт заблокирован!"); return; } 
        
        clearLoginAttempts(login);
        currentUserId = u.id; viewingUserId = null; window.location.hash = ''; 
        localStorage.setItem('rb_session', currentUserId); render(); 
        showMessage("Добро пожаловать, " + escapeHtml(u.name), 'success'); 
    }
    
    function logout() { 
        currentUserId = null; viewingUserId = null; window.location.hash = ''; 
        localStorage.removeItem('rb_session'); render(); 
    }
    
    async function register(login, pass, name, agreeToRules) { 
        if(!agreeToRules) { showMessage("Вы должны согласиться с правилами"); return false; } 
        if(users.find(x => x.login.toLowerCase() === login.toLowerCase())) { 
            showMessage("Логин занят"); return false; 
        } 
        if(login.length < 3 || pass.length < 6 || name.length < 2) { 
            showMessage("Минимум 3/6/2 символов"); return false; 
        } 
        if(!/^[a-zA-Z0-9_]+$/.test(login)) {
            showMessage("Логин может содержать только буквы, цифры и _");
            return false;
        }
        let newId = "user_" + Date.now(); 
        let h = await hashPassword(pass); 
        let newUser = { 
            id: newId, login, password: h, name: name.substring(0, 50), 
            isAdmin: false, verified: false, avatar: "", banned: false 
        };
        await supabase.from('users').upsert(newUser); 
        users.push(newUser);
        showMessage("Регистрация успешна! Войдите.", 'success'); 
        return true; 
    }

    async function publishPost() {

        let newPost = { 
            id: Date.now().toString(), authorId: u.id, authorName: u.name, 
            verified: u.verified, timestamp: Date.now(), text: txt.trim(), 
            photo: "", audio: "", likes: [], comments: [], deleted: false 
        };

        if (data) posts.unshift(data);
        document.getElementById('postText').value = '';

        showMessage("Опубликовано!", 'success');

    function getRecommendedPosts() {
        const cu = getCurrentUser();
        if (!cu) return [];
        const liked = posts.filter(p => p.likes && p.likes.includes(cu.id));
        const subs = subscriptions[cu.id] || [];
        const kw = new Map();
        liked.forEach(p => p.text.toLowerCase().split(/\s+/).forEach(w => { if(w.length > 3) kw.set(w, (kw.get(w)||0)+1); }));
        return posts
            .filter(p => p.authorId !== cu.id && !getUserById(p.authorId)?.banned && !p.deleted && (!p.likes || !p.likes.includes(cu.id)))
            .map(p => {
                let s = 0;
                if (subs.includes(p.authorId)) s += 10;
                p.text.toLowerCase().split(/\s+/).forEach(w => { if(kw.has(w)) s += kw.get(w) * 0.5; });
                s += Math.min((p.likes?.length || 0) * 0.2, 5);
                return { p, s };
            })
            .filter(x => x.s > 0)
            .sort((a,b) => b.s - a.s)
            .slice(0, 30)
            .map(x => x.p);
    }

        const rec = getRecommendedPosts();

        const regularPosts = posts
            .filter(p => !getUserById(p.authorId)?.banned && !p.deleted && p.authorId !== cu.id)
            .filter(p => !rec.some(r => r.id === p.id))

            .slice(0, 20);
        
        let html = '<h3 style="margin-bottom:15px;">Рекомендовано для вас</h3>';
        
        if (rec.length === 0) {
            html += '<div style="text-align:center;padding:20px;">Пока нет рекомендаций. Подпишитесь на пользователей или лайкните несколько постов!</div>';
        } else {
            rec.forEach(p => {
                let canDel = cu && (cu.id === p.authorId || cu.isAdmin);
                let isLiked = cu && p.likes && p.likes.includes(cu.id);
                let vBadge = getUserById(p.authorId)?.verified ? ' <span class="verified-icon">✔</span>' : '';
                let isSubscribed = cu && isFollowing(cu.id, p.authorId) && cu.id !== p.authorId;
                html += `<div class="post"><div class="post-header" onclick="window.viewUserProfile('${escapeAttr(p.authorId)}')"><div class="post-avatar" style="background-image:${getAvatarUrl(p.authorId)}"></div><div><span class="post-author">${escapeHtml(p.authorName)}${vBadge}</span><span class="post-time">${formatTime(p.timestamp)}</span>${cu && cu.id !== p.authorId ? `<button class="comment-action" style="margin-left:8px;background:${isSubscribed?'#8b9dc3':'#4267b2'};color:white;border:none;padding:3px 8px;border-radius:3px;cursor:pointer;font-size:10px;" onclick="event.stopPropagation(); window.toggleFollow('${cu.id}','${p.authorId}')">${isSubscribed ? 'Отписаться' : 'Подписаться'}</button>` : ''}</div></div><div class="post-content">${linkify(applyFormatting(escapeHtml(p.text).replace(/\n/g, '<br>')))}</div>${p.photo ? `<img class="post-photo" src="${escapeAttr(p.photo)}">` : ''}<div class="post-stats"><button class="like-btn ${isLiked ? 'liked' : ''}" onclick="window.toggleLike('${escapeAttr(p.id)}')">Нравится (${p.likes?.length || 0})</button>${canDel ? `<button class="delete-btn" onclick="window.deletePost('${escapeAttr(p.id)}')">Удалить пост</button>` : ''}</div></div>`;
            });
        }
        
        if (regularPosts.length > 0) {
            html += '<h3 style="margin:25px 0 15px;">Другие пользователи</h3>';
            regularPosts.forEach(p => {
                let canDel = cu && (cu.id === p.authorId || cu.isAdmin);
                let isLiked = cu && p.likes && p.likes.includes(cu.id);
                let vBadge = getUserById(p.authorId)?.verified ? ' <span class="verified-icon">✔</span>' : '';
                let isSubscribed = cu && isFollowing(cu.id, p.authorId) && cu.id !== p.authorId;
                html += `<div class="post"><div class="post-header" onclick="window.viewUserProfile('${escapeAttr(p.authorId)}')"><div class="post-avatar" style="background-image:${getAvatarUrl(p.authorId)}"></div><div><span class="post-author">${escapeHtml(p.authorName)}${vBadge}</span><span class="post-time">${formatTime(p.timestamp)}</span>${cu && cu.id !== p.authorId ? `<button class="comment-action" style="margin-left:8px;background:${isSubscribed?'#8b9dc3':'#4267b2'};color:white;border:none;padding:3px 8px;border-radius:3px;cursor:pointer;font-size:10px;" onclick="event.stopPropagation(); window.toggleFollow('${cu.id}','${p.authorId}')">${isSubscribed ? 'Отписаться' : 'Подписаться'}</button>` : ''}</div></div><div class="post-content">${linkify(applyFormatting(escapeHtml(p.text).replace(/\n/g, '<br>')))}</div>${p.photo ? `<img class="post-photo" src="${escapeAttr(p.photo)}">` : ''}<div class="post-stats"><button class="like-btn ${isLiked ? 'liked' : ''}" onclick="window.toggleLike('${escapeAttr(p.id)}')">Нравится (${p.likes?.length || 0})</button>${canDel ? `<button class="delete-btn" onclick="window.deletePost('${escapeAttr(p.id)}')">Удалить пост</button>` : ''}</div></div>`;
            });
        }
        
        c.innerHTML = html;
    }

    async function saveSettings() {
        await supabase.from('settings').upsert({ key: 'main', aboutText, rulesText });
    }

    function renderAbout() {
        const c = document.getElementById('aboutContainer');
        const isAdminUser = isAdmin();
        let html = `<h3>О сайте</h3>`;
        if (isAdminUser) {
            html += `<textarea id="aboutEdit" rows="8" style="width:100%;margin:10px 0;padding:8px;">${escapeHtml(aboutText)}</textarea>`;
            html += `<button id="saveAboutBtn" class="auth-btn">Сохранить</button>`;
        } else {
            html += `<div style="margin:15px 0; line-height:1.5;">${escapeHtml(aboutText).replace(/\n/g, '<br>')}</div>`;
        }
        c.innerHTML = html;
        if (isAdminUser) {
            document.getElementById('saveAboutBtn').onclick = async () => {
                aboutText = document.getElementById('aboutEdit').value;
                await saveSettings();
                showMessage('Раздел "О сайте" обновлён', 'success');
                renderAbout();
            };
        }
    }

    function renderRules() {
        const c = document.getElementById('rulesContainer');
        const isAdminUser = isAdmin();
        let html = `<h3>Правила RetroBook</h3>`;
        if (isAdminUser) {
            html += `<textarea id="rulesEdit" rows="8" style="width:100%;margin:10px 0;padding:8px;">${escapeHtml(rulesText)}</textarea>`;
            html += `<button id="saveRulesBtn" class="auth-btn">Сохранить</button>`;
        } else {
            html += `<div style="margin:15px 0; line-height:1.5; white-space:pre-wrap;">${escapeHtml(rulesText)}</div>`;
        }
        c.innerHTML = html;
        if (isAdminUser) {
            document.getElementById('saveRulesBtn').onclick = async () => {
                rulesText = document.getElementById('rulesEdit').value;
                await saveSettings();
                showMessage('Правила обновлены', 'success');
                renderRules();
            };
        }
    }

    async function parseHash() {
        await waitForData();
        const h = window.location.hash.substring(1);
        if (h === 'about') { currentTab = 'about'; viewingUserId = null; }
        else if (h === 'rules') { currentTab = 'rules'; viewingUserId = null; }
        else if (h === 'recommendations') { currentTab = 'recommendations'; viewingUserId = null; }
        else if (h.startsWith('users/')) { 
            currentTab = 'feed'; 
            const identifier = h.split('/')[1]; 
            const user = getUserByIdentifier(identifier);
            if (user) viewingUserId = user.id;
            else { showMessage(`Пользователь не найден`, 'error'); viewingUserId = null; window.location.hash = ''; }
        }
        else { currentTab = 'feed'; viewingUserId = null; }
        render();
    }

    function render() { 
        renderAuth(); renderSidebar(); renderMobile(); renderPostArea(); 
        document.getElementById('feedContainer').style.display = currentTab === 'feed' ? 'block' : 'none';
        document.getElementById('recommendationsContainer').style.display = currentTab === 'recommendations' ? 'block' : 'none';
        document.getElementById('aboutContainer').style.display = currentTab === 'about' ? 'block' : 'none';
        document.getElementById('rulesContainer').style.display = currentTab === 'rules' ? 'block' : 'none';
        if(currentTab === 'feed') renderFeed(); 
        else if(currentTab === 'recommendations') renderRecommendations();
        else if(currentTab === 'about') renderAbout();
        else if(currentTab === 'rules') renderRules();
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelector(`.tab-btn[data-tab="${currentTab}"]`)?.classList.add('active');
        if (isAdmin()) {
            let html = '<select id="adminUserSelect" style="width:100%;margin-bottom:10px;">';
            users.filter(u => u.id !== ADMIN_ID).forEach(u => { html += `<option value="${u.id}">${escapeHtml(u.name)} (${u.login})</option>`; });
            html += '</select>';
            document.getElementById('adminUsers').innerHTML = html;
        } else {
            document.getElementById('adminUsers').innerHTML = 'Доступно админу';
        }
    }

    function formatText(text, format) { 
        let ta = document.getElementById('postText'); let start = ta.selectionStart, end = ta.selectionEnd; 
        let selected = text.substring(start, end); 
        let replacement = format === 'bold' ? '**' + selected + '**' : format === 'italic' ? '*' + selected + '*' : format === 'underline' ? '__' + selected + '__' : '~~' + selected + '~~'; 
        return text.substring(0, start) + replacement + text.substring(end); 
    }

    function isFollowing(a,b) { return subscriptions[a] && subscriptions[a].includes(b); }
    function getFollowedCount(id) { return subscriptions[id] ? subscriptions[id].length : 0; }
    function getFollowers(userId) { 
        let followers = []; 
        for(let [subId, following] of Object.entries(subscriptions)) { 
            if(following.includes(userId)) { 
                let user = getUserById(subId); 
                if(user && !user.banned) followers.push(user); 
            } 
        } 
        return followers; 
    }
    
    window.toggleFollow = async function(a,b) { 
        if(a===b) { showMessage("Нельзя подписаться на себя"); return; } 
        if(!subscriptions[a]) subscriptions[a] = []; 
        let i = subscriptions[a].indexOf(b); 
        i===-1 ? subscriptions[a].push(b) : subscriptions[a].splice(i,1); 
        await saveSubscription(a, subscriptions[a]); 
        renderSidebar(); renderMobile(); 
        if (currentTab === 'feed') renderFeed();
        else if (currentTab === 'recommendations') renderRecommendations();
        showMessage(i===-1 ? "Вы подписались" : "Вы отписались"); 
    };
    
    async function saveSubscription(userId, following) { 
        await supabase.from('subscriptions').upsert({ userId, following }); 
    }
    
    function showSubsModal() { 
        let u = getUserById(viewingUserId || currentUserId); 
        if(!u) return; 
        let ids = subscriptions[u.id] || []; 
        let usersList = ids.map(id=>getUserById(id)).filter(x=>x && !x.banned); 
        let modal = document.createElement('div'); modal.className = 'modal'; 
        modal.innerHTML = `<div class="modal-content"><h3>Подписки ${escapeHtml(u.name)} (${usersList.length})</h3><div id="subsList"></div><button id="closeSubsModal" class="auth-btn">Закрыть</button></div>`; 
        document.body.appendChild(modal); 
        let listDiv = modal.querySelector('#subsList'); 
        if(usersList.length === 0) listDiv.innerHTML = '<p>Нет подписок</p>'; 
        else { 
            usersList.forEach(user => { 
                let div = document.createElement('div'); div.className = 'subs-item'; 
                div.innerHTML = `<strong>${escapeHtml(user.name)}</strong> ${user.verified ? '<span class="verified-icon">✔</span>' : ''}`; 
                div.onclick = () => { window.location.hash = 'users/' + encodeURIComponent(user.login); viewingUserId = user.id; modal.remove(); render(); }; 
                listDiv.appendChild(div); 
            }); 
        } 
        modal.querySelector('#closeSubsModal').onclick = () => modal.remove(); 
    }
    
    function showFollowersModal() { 
        let user = getUserById(viewingUserId || currentUserId); 
        if(!user) return; 
        let followers = getFollowers(user.id); 
        let modal = document.createElement('div'); modal.className = 'modal'; 
        modal.innerHTML = `<div class="modal-content"><h3>Подписчики ${escapeHtml(user.name)} (${followers.length})</h3><div id="followersList"></div><button id="closeFollowersModal" class="auth-btn">Закрыть</button></div>`; 
        document.body.appendChild(modal); 
        let listDiv = modal.querySelector('#followersList'); 
        if(followers.length === 0) listDiv.innerHTML = '<p>Нет подписчиков</p>'; 
        else { 
            followers.forEach(f => { 
                let div = document.createElement('div'); div.className = 'followers-item'; 
                div.innerHTML = `<strong>${escapeHtml(f.name)}</strong> ${f.verified ? '<span class="verified-icon">✔</span>' : ''}`; 
                div.onclick = () => { window.location.hash = 'users/' + encodeURIComponent(f.login); viewingUserId = f.id; modal.remove(); render(); }; 
                listDiv.appendChild(div); 
            }); 
        } 
        modal.querySelector('#closeFollowersModal').onclick = () => modal.remove(); 
    }
    
    function showAccountModal() { 
        let u = getCurrentUser(); if(!u) return; 
        let modal = document.createElement('div'); modal.className = 'modal'; 
        modal.innerHTML = `<div class="modal-content"><h3>Управление аккаунтом</h3><div class="account-section"><h4>Изменить имя</h4><input type="text" id="newName" value="${escapeHtml(u.name)}"><button id="saveNameBtn" class="auth-btn">Сохранить</button></div><div class="account-section"><h4>Изменить логин</h4><input type="text" id="newLogin" value="${escapeHtml(u.login)}"><button id="saveLoginBtn" class="auth-btn">Сохранить</button></div><div class="account-section"><h4>Изменить пароль</h4><input type="password" id="newPassword" placeholder="Новый пароль"><input type="password" id="confirmPassword" placeholder="Подтвердите пароль"><button id="savePasswordBtn" class="auth-btn">Сохранить</button></div><button id="deleteAccountBtn" class="delete-account-btn">Удалить аккаунт</button><button id="closeAccountModal" class="auth-btn" style="background:#8b9dc3; width:100%; margin-top:10px;">Закрыть</button></div>`; 
        document.body.appendChild(modal); 
        document.getElementById('saveNameBtn').onclick = async () => { 
            u.name = document.getElementById('newName').value.trim().substring(0, 50); 
            await supabase.from('users').upsert(u); modal.remove(); renderSidebar(); renderMobile(); 
            showMessage("Имя обновлено", 'success'); 
        }; 
        document.getElementById('saveLoginBtn').onclick = async () => { 
            let nl = document.getElementById('newLogin').value.trim(); 
            if(!/^[a-zA-Z0-9_]+$/.test(nl)) { showMessage("Логин может содержать только буквы, цифры и _"); return; }
            if(users.find(x=>x.login.toLowerCase() === nl.toLowerCase() && x.id !== u.id)) { showMessage("Логин занят"); return; } 
            u.login = nl; await supabase.from('users').upsert(u); modal.remove(); renderSidebar(); renderMobile(); 
            showMessage("Логин обновлен", 'success'); 
        }; 
        document.getElementById('savePasswordBtn').onclick = async () => { 
            let np = document.getElementById('newPassword').value, cp = document.getElementById('confirmPassword').value; 
            if(!np) return; if(np !== cp) { showMessage("Пароли не совпадают"); return; } 
            if(np.length < 6) { showMessage("Пароль должен быть не менее 6 символов"); return; } 
            u.password = await hashPassword(np); await supabase.from('users').upsert(u); modal.remove(); 
            showMessage("Пароль обновлен", 'success'); 
        }; 
        document.getElementById('deleteAccountBtn').onclick = async () => { 
            if(confirm("Вы уверены? Все ваши данные будут удалены!")) { 
                for(let p of posts.filter(post => post.authorId === u.id)) { 
                    await supabase.from('posts').delete().eq('id', p.id); 
                } 
                await supabase.from('subscriptions').delete().eq('userId', u.id); 
                await supabase.from('users').delete().eq('id', u.id); 
                if(currentUserId === u.id) { currentUserId = null; viewingUserId = null; localStorage.removeItem('rb_session'); window.location.hash = ''; } 
                modal.remove(); location.reload(); 
            } 
        }; 
        document.getElementById('closeAccountModal').onclick = () => modal.remove(); 
    }
    
    function showAvatarUpload() { 
        let u = getCurrentUser(); if(!u) return; 
        let modal = document.createElement('div'); 
        modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:1000'; 
        modal.innerHTML = `<div style="background:white;width:320px;padding:20px;border-radius:8px;text-align:center;"><h3>Сменить аватар</h3><div id="avPrev" style="width:100px;height:100px;border-radius:50%;background-size:cover;margin:10px auto;"></div><input type="file" id="avFile" accept="image/*"><div><button id="upBtn" class="auth-btn">Выбрать</button><button id="canBtn" class="auth-btn" style="background:#8b9dc3;">Отмена</button></div></div>`; 
        document.body.appendChild(modal); 
        let prev = modal.querySelector('#avPrev'); 
        prev.style.backgroundImage = getAvatarUrl(u.id); 
        modal.querySelector('#avFile').onchange = e => { 
            let f = e.target.files[0]; 
            if(f && f.size <= 5*1024*1024) { 
                let r = new FileReader(); 
                r.onload = ev => prev.style.backgroundImage = `url('${ev.target.result}')`; 
                r.readAsDataURL(f); 
            } else showMessage("Файл больше 5 МБ"); 
        }; 
        modal.querySelector('#upBtn').onclick = async () => { 
            let f = modal.querySelector('#avFile').files[0]; 
            if(f) { 
                let r = new FileReader(); 
                r.onload = async ev => { 
                    u.avatar = ev.target.result; 
                    await supabase.from('users').upsert(u); 
                    modal.remove(); renderSidebar(); renderMobile(); 
                    showMessage("Аватар обновлён"); 
                }; 
                r.readAsDataURL(f); 
            } else showMessage("Выберите файл"); 
        }; 
        modal.querySelector('#canBtn').onclick = () => modal.remove(); 
    }

    async function loadSubscriptions() { 
        const { data } = await supabase.from('subscriptions').select('*'); 
        subscriptions = {}; 
        if (data) data.forEach(item => { subscriptions[item.userId] = item.following || []; }); 
    }

    async function loadSettings() {
        const { data } = await supabase.from('settings').select('*').eq('key', 'main').single();
        if (data) {
            aboutText = data.aboutText || aboutText;
            rulesText = data.rulesText || rulesText;
        }
    }

    async function init() {
        if (initialized) return;
        initialized = true;
        
        document.getElementById('feedContainer').innerHTML = '<div class="loading-indicator">Загрузка...</div>';
        
        const [usersRes, postsRes, subsRes] = await Promise.all([
            supabase.from('users').select('*'),
            supabase.from('posts').select('*').order('timestamp', { ascending: false }),
            supabase.from('subscriptions').select('*')
        ]);
        users = usersRes.data || [];
        posts = (postsRes.data || []).filter(p => !p.deleted);
        if (subsRes.data) { subscriptions = {}; subsRes.data.forEach(item => { subscriptions[item.userId] = item.following || []; }); }
        
        await loadSettings();
        
        const adminExists = users.find(u => u.id === ADMIN_ID);
        if (!adminExists) {
            const h = await hashPassword('admin');
            const admin = { id: ADMIN_ID, login: ADMIN_LOGIN, password: h, name: "RetroBook", isAdmin: true, verified: true, avatar: "", banned: false };
            await supabase.from('users').upsert(admin);
            users.push(admin);
        }
        
        dataReady = true;
        const saved = localStorage.getItem('rb_session');
        if (saved && users.find(u => u.id === saved && !u.banned)) currentUserId = saved;
        
        window.addEventListener('hashchange', parseHash);
        
        document.querySelectorAll('.format-btn').forEach(btn => btn.addEventListener('click', () => {
            const ta = document.getElementById('postText'); ta.value = formatText(ta.value, btn.dataset.format); ta.focus();
        }));
        document.getElementById('postText').addEventListener('input', function() {
            document.getElementById('charCounter').innerText = this.value.length + ' / 1500';
        });
        document.getElementById('publishBtn').addEventListener('click', publishPost);
        document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => {
            currentTab = btn.dataset.tab; viewingUserId = null;
            window.location.hash = currentTab === 'feed' ? '' : currentTab;
            if (currentTab === 'feed') currentFeedMode = 'recent';
            render();
        }));
        document.querySelectorAll('.feed-tab-btn').forEach(btn => btn.addEventListener('click', () => {
            document.querySelectorAll('.feed-tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active'); currentFeedMode = btn.dataset.feed; renderFeed();
        }));
        document.getElementById('burgerBtn').addEventListener('click', () => {
            document.getElementById('mobileSidebar').classList.add('open'); document.getElementById('mobileOverlay').classList.add('open');
        });
        document.getElementById('closeMobile').addEventListener('click', () => {
            document.getElementById('mobileSidebar').classList.remove('open'); document.getElementById('mobileOverlay').classList.remove('open');
        });
        document.getElementById('mobileOverlay').addEventListener('click', () => {
            document.getElementById('mobileSidebar').classList.remove('open'); document.getElementById('mobileOverlay').classList.remove('open');
        });
        document.getElementById('closeAdmin')?.addEventListener('click', () => document.getElementById('adminPanel').classList.remove('open'));
        document.querySelectorAll('.mobile-tab-btn').forEach(btn => btn.addEventListener('click', () => {
            currentTab = btn.dataset.tab; viewingUserId = null;
            window.location.hash = currentTab === 'feed' ? '' : currentTab;
            document.getElementById('mobileSidebar').classList.remove('open'); document.getElementById('mobileOverlay').classList.remove('open');
            render();
        }));
        
        setTimeout(() => parseHash(), 10);
    }

    init();
</script>
</body>
